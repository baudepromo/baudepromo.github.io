<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos - Oferta Mega</title>
    <script src="menu.js" defer></script>
    <style scr="/css/stylebase.css"></style>
    <style>
        /* ESTILO ESPECÍFICO DESTA PÁGINA */
        .search-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            gap: 10px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus { border-color: var(--primary); }

        .social-bar {
            background: #fff;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .social-link {
            margin: 0 10px;
            text-decoration: none;
            color: var(--dark);
            font-weight: bold;
            font-size: 14px;
        }

        .social-link:hover { color: var(--primary); }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* CARD DE PRODUTO */
        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,.08);
            transition: 0.3s;
            animation: fadeIn 0.5s ease forwards;
        }

        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; border-radius: 12px; margin-bottom: 10px; }
        .product-card h4 { font-size: 14px; margin-bottom: 8px; height: 40px; overflow: hidden; }
        .price { font-weight: bold; color: var(--primary); font-size: 18px; }
        
        .btn-buy {
            display: block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }

        /* PAGINAÇÃO */
        .pagination {
            display: flex;
            justify-content: center;
            margin: 40px 0;
            gap: 10px;
        }

        .page-btn {
            padding: 8px 16px;
            border: none;
            background: #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn.active { background: var(--primary); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Badge de Desconto */
.discount-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #2ecc71; /* Verde sucesso */
    color: white;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
    z-index: 10;
}

.product-card {
    position: relative; /* Para a badge ficar no lugar certo */
}

.old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 13px;
    display: block;
    margin-bottom: 2px;
}

.current-price {
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
}
    </style>
</head>
<body>

    <meu-menu></meu-menu>

    <div class="social-bar">
        <span>Siga-nos: </span>
        <a href="#" class="social-link">Instagram</a>
        <a href="#" class="social-link">TikTok</a>
        <a href="#" class="social-link">WhatsApp</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Procurar um achadinho...">
    </div>

    <div class="container">
        <div class="products-grid" id="productsGrid">
            </div>

        <div class="pagination" id="pagination">
            </div>
    </div>

    <script>
        let allProducts = [];
        let filteredProducts = [];
        const itemsPerPage = 8;
        let currentPage = 1;

        // 1. CARREGAR JSON
        async function loadProducts() {
            try {
                const response = await fetch('/data/achadinhos.json');
                allProducts = await response.json();
                
                // 2. EMBARALHAR (Shuffle algorithm)
                allProducts.sort(() => Math.random() - 0.5);
                
                filteredProducts = [...allProducts];
                displayProducts();
            } catch (error) {
                console.error("Erro ao carregar JSON:", error);
            }
        }

        // 3. EXIBIR PRODUTOS COM PAGINAÇÃO
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedItems = filteredProducts.slice(start, end);

            paginatedItems.forEach(item => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${item.imagem}" alt="${item.titulo}">
                        <h4>${item.titulo}</h4>
                        <p class="price">R$ ${item.preco}</p>
                        <a href="${item.link}" class="btn-buy" target="_blank">Ver Oferta</a>
                    </div>
                `;
            });

            setupPagination();
        }

        // 4. SISTEMA DE PROCURA
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredProducts = allProducts.filter(p => 
                p.titulo.toLowerCase().includes(term)
            );
            currentPage = 1;
            displayProducts();
        });

        // 5. LÓGICA DE PAGINAÇÃO
        function setupPagination() {
            const pageCount = Math.ceil(filteredProducts.length / itemsPerPage);
            const wrapper = document.getElementById('pagination');
            wrapper.innerHTML = "";

            for (let i = 1; i <= pageCount; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.classList.add('page-btn');
                if (i === currentPage) btn.classList.add('active');
                
                btn.addEventListener('click', () => {
                    currentPage = i;
                    displayProducts();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                wrapper.appendChild(btn);
            }
        }

        loadProducts();
    </script>
    <div id="footer-placeholder"></div>
</body>
</html>
