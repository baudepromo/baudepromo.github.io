<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Achadinhos - Oferta Mega</title>

    <!-- CSS BASE GLOBAL -->
    <link rel="stylesheet" href="/css/stylebase.css">

    <!-- JS MENU -->
    <script src="/js/menu.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">Oferta Mega</div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="menu" id="menu">
            <a href="/">Início</a>
            <a href="pages/achadinhos/">Achadinhos</a>
            <a href="pages/produtos/">Produtos</a>
            <a href="pages/cupons/">Cupons</a>
            <a href="/favoritos/">Favoritos</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>🔥 Achadinhos que valem a pena</h2>
        <p>Ofertas testadas, produtos virais e descontos reais</p>

        <div class="quick-nav">
            <a href="pages/achadinhos/" class="btn-nav btn-achadinhos">
                🔥 Achadinhos
            </a>

            <a href="pages/produtos/" class="btn-nav btn-produtos">
                🛒 Produtos
            </a>

            <a href="pages/cupons/" class="btn-nav btn-cupons">
                💸 Cupons
            </a>
        </div>
    </section>

    <!-- SOCIAL BAR -->
    <div class="social-bar">
        <span>Siga-nos:</span>
        <a href="#" class="social-link">Instagram</a>
        <a href="#" class="social-link">TikTok</a>
        <a href="#" class="social-link">WhatsApp</a>
    </div>

    <!-- PESQUISA -->
    <div class="search-container">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Procurar um achadinho..."
        >
    </div>

    <!-- CONTEÚDO -->
    <main class="container">

        <h2 class="section-title">Achadinhos do Dia</h2>

        <div class="products-grid" id="productsGrid">
            <!-- Produtos via JS -->
        </div>

        <div class="pagination" id="pagination">
            <!-- Paginação -->
        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

<script src="/js/footer.js"></script>

    <!-- SCRIPT DOS PRODUTOS -->
    <script>
        let allProducts = [];
        let filteredProducts = [];
        const itemsPerPage = 8;
        let currentPage = 1;

        async function loadProducts() {
            try {
                const response = await fetch('/data/achadinhos.json');
                allProducts = await response.json();

                allProducts.sort(() => Math.random() - 0.5);
                filteredProducts = [...allProducts];

                displayProducts();
            } catch (e) {
                console.error("Erro ao carregar produtos", e);
            }
        }

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;

            filteredProducts.slice(start, end).forEach(item => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${item.imagem}" alt="${item.titulo}">
                        <h4>${item.titulo}</h4>
                        <p class="price">R$ ${item.preco}</p>
                        <a href="${item.link}" class="btn-buy" target="_blank">
                            Ver Oferta
                        </a>
                    </div>
                `;
            });

            setupPagination();
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            filteredProducts = allProducts.filter(p =>
                p.titulo.toLowerCase().includes(term)
            );
            currentPage = 1;
            displayProducts();
        });

        function setupPagination() {
            const pageCount = Math.ceil(filteredProducts.length / itemsPerPage);
            const wrapper = document.getElementById('pagination');
            wrapper.innerHTML = "";

            for (let i = 1; i <= pageCount; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = "page-btn" + (i === currentPage ? " active" : "");

                btn.onclick = () => {
                    currentPage = i;
                    displayProducts();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                };

                wrapper.appendChild(btn);
            }
        }

        loadProducts();
    </script>

</body>
</html>
