<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Baú de Promoções | Melhores Achadinhos e Ofertas</title>
    <meta name="description" content="Encontre as melhores ofertas, promoções e achadinhos da internet.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VNJR25033"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4VNJR25033');
    </script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff4b4b 0%, #ff9000 100%);
            --bg-body: #f5f5f5;
            --text-dark: #1a1a1a;
            --text-grey: #666;
            --white: #ffffff;
            --accent-yellow: #fdd835;
            --radius-card: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        /* --- HEADER & HERO --- */
        header.top-bar {
            background: #ff4b4b;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            text-transform: uppercase;
            text-decoration: none;
        }

        .hero-mini {
            background: var(--primary-gradient);
            padding: 30px 20px 80px; /* Espaço extra embaixo para encaixar a busca ou design */
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 20px rgba(255, 75, 75, 0.15);
            position: relative;
        }

        .hero-mini h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* --- REDES SOCIAIS (Pílulas) --- */
        .social-pills {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .social-link {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        .social-link:hover {
            background: white;
            color: #ff4b4b;
            transform: translateY(-3px);
        }

        /* --- BARRA DE BUSCA (Estilo Flutuante) --- */
        .search-wrapper {
            max-width: 600px;
            margin: 20px auto 0;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            outline: none;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        /* --- GRID DE PRODUTOS --- */
        .grid-container {
            max-width: 1200px;
            margin: -40px auto 0; /* Puxa para cima para sobrepor levemente ou ficar próximo */
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* Mobile friendly */
            gap: 15px;
        }

        @media(min-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 25px;
            }
        }

        /* --- CARD DE PRODUTO --- */
        .card {
            background: white;
            border-radius: var(--radius-card);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-yellow);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-img-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #fff;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s;
        }

        .card:hover img { transform: scale(1.05); }

        .card-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            border-top: 1px solid #f0f0f0;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            height: 40px; /* Altura fixa para alinhar */
        }

        .price-box {
            margin-top: auto;
        }

        .old-price {
            font-size: 0.75rem;
            color: #999;
            text-decoration: line-through;
            display: block;
        }

        .current-price {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ff4b4b;
        }

        .btn-view {
            margin-top: 10px;
            background: #111;
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            width: 100%;
            display: block;
        }

        .card:hover .btn-view {
            background: #ff4b4b;
        }

        /* --- PAGINAÇÃO --- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
        }

        .pagination button {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            color: #333;
            transition: 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: #ff4b4b;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #page {
            font-weight: 800;
            font-size: 1.1rem;
            color: #333;
        }

        /* --- MENU HAMBURGUER (Simples para manter funcionalidade) --- */
        .hamburger-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* Menu Lateral (Mesmo da home) */
        .mobile-menu {
            position: fixed;
            top: 0; right: -300px; width: 300px; height: 100%;
            background: white; z-index: 1000;
            padding: 60px 30px; transition: 0.3s;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 15px;
        }
        .mobile-menu.active { right: 0; }
        .mobile-menu a { text-decoration: none; color: #333; font-weight: 500; }
        .close-menu { position: absolute; top: 20px; right: 20px; font-size: 2rem; background:none; border:none; cursor:pointer;}

    </style>
</head>
<body>

    <header class="top-bar">
        <a href="/" class="logo"><i class="fa-solid fa-box-open"></i> Baú de Promo</a>
        <button class="hamburger-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <nav class="mobile-menu" id="sideMenu">
        <button class="close-menu" onclick="toggleMenu()">&times;</button>
        <a href="/">Início</a>
        <a href="/achadinhos">🛒 Achadinhos Shopee</a>
        <a href="/cupons">🎟️ Cupons</a>
        <a href="/produtos">🔥 Melhores Produtos</a>
        <a href="/contatos">💬 Contato</a>
    </nav>

    <section class="hero-mini">
        <h1>Ofertas & Achadinhos</h1>
        <p style="font-size: 0.9rem; opacity: 0.9;">Curadoria diária das melhores promoções.</p>
        
        <div class="social-pills">
            <a href="https://www.instagram.com/baudepromocaos" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@baudepromocoes" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://x.com/baudepromocao" class="social-link"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://whatsapp.com/channel/..." class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <div class="search-wrapper">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="search" placeholder="O que você procura hoje? (Ex: iPhone, Ventilador...)">
        </div>
    </section>

    <main class="grid-container">
        <div class="grid" id="grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Carregando ofertas...
            </div>
        </div>

        <nav class="pagination" aria-label="Navegação">
            <button id="prev" aria-label="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="page">1</span>
            <button id="next" aria-label="Próxima"><i class="fa-solid fa-chevron-right"></i></button>
        </nav>
    </main>

    <script>
        // Toggle Menu
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        // Lógica dos Produtos
        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const PER_PAGE = 12;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadProducts() {
            try {
                // ATENÇÃO: Verifique se o caminho data/products.json está correto no seu projeto
                const res = await fetch('data/products.json');
                if (!res.ok) throw new Error("Erro ao buscar JSON");
                
                const data = await res.json();
                allProducts = shuffle(data);
                filteredProducts = [...allProducts];
                render();
            } catch (err) {
                console.error(err);
                document.getElementById('grid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <p>Ops! Não conseguimos carregar as ofertas agora.</p>
                        <button onclick="location.reload()" style="padding:10px 20px; margin-top:10px; border:none; background:#ff4b4b; color:white; border-radius:5px; cursor:pointer;">Tentar Novamente</button>
                    </div>
                `;
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Nenhum produto encontrado.</div>';
                return;
            }

            const start = (currentPage - 1) * PER_PAGE;
            const end = start + PER_PAGE;

            // Renderiza os Cards com o NOVO DESIGN
            filteredProducts.slice(start, end).forEach((p, index) => {
                const imgUrl = p.image || p.img || 'https://via.placeholder.com/300?text=Sem+Imagem';
                const productTitle = p.title.replace(/"/g, '&quot;');
                
                // Formatação de preço segura (caso venha number ou string)
                let displayPrice = p.currentPrice || p.price;
                if(typeof displayPrice === 'number') displayPrice = displayPrice.toFixed(2).replace('.', ',');

                grid.insertAdjacentHTML('beforeend', `
                    <a href="${p.link}" class="card" target="_blank" rel="noopener noreferrer">
                        <span class="badge">${p.badge || '🔥 OFERTA'}</span>
                        <div class="card-img-wrapper">
                            <img src="${imgUrl}" alt="${productTitle}" loading="lazy">
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">${p.title}</h3>
                            <div class="price-box">
                                ${p.oldPrice ? `<span class="old-price">De: ${p.oldPrice}</span>` : ''}
                                <span class="current-price">R$ ${displayPrice}</span>
                            </div>
                            <span class="btn-view">VER OFERTA</span>
                        </div>
                    </a>
                `);
            });

            // Atualiza Paginação
            document.getElementById('page').innerText = currentPage;
            document.getElementById('prev').disabled = currentPage === 1;
            document.getElementById('next').disabled = end >= filteredProducts.length;
        }

        // Filtro de Busca
        let searchTimer;
        document.getElementById('search').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                filteredProducts = allProducts.filter(p => 
                    p.title.toLowerCase().includes(term)
                );
                currentPage = 1;
                render();
            }, 300);
        });

        document.getElementById('prev').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        document.getElementById('next').onclick = () => {
            if ((currentPage * PER_PAGE) < filteredProducts.length) {
                currentPage++;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        loadProducts();
    </script>
    
    <footer id="footer"></footer>
    <script src="/assets/js/main.js" defer></script>
</body>
</html>
