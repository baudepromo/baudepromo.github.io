<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Achadinhos - Oferta Mega</title>

    <!-- CSS BASE GLOBAL -->
    <link rel="stylesheet" href="/css/stylebase.css">

    <!-- JS MENU -->
     <script src="/js/menu.js" defer></script>
    <style>
        .modern-search {
    max-width: 650px;
    margin: 30px auto;
    padding: 0 20px;
}

.modern-search input {
    width: 100%;
    padding: 16px 22px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    background: #fff;
    box-shadow: 0 8px 25px rgba(0,0,0,.08);
    outline: none;
    transition: .3s;
}

.modern-search input:focus {
    box-shadow: 0 10px 30px rgba(255,77,90,.25);
}

.social-bar {
    max-width: 1200px;
    margin: 25px auto;
    padding: 12px 20px;
    background: #fff;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,.05);
    font-size: 14px;
}

.social-bar span {
    font-weight: 600;
    color: #333;
}

.social-link {
    padding: 8px 14px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 600;
    color: #fff;
    font-size: 13px;
    transition: .3s;
}

/* cores */
.social-link.instagram {
    background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
}

.social-link.tiktok {
    background: #000;
}

.social-link.whatsapp {
    background: #25d366;
}

.social-link:hover {
    transform: translateY(-3px);
    opacity: .9;
}

.pagination {
    margin: 50px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.page-btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #f1f1f1;
    cursor: pointer;
    font-weight: 600;
    transition: .25s;
}

.page-btn:hover {
    background: #ff4d5a;
    color: #fff;
}

.page-btn.active {
    background: #ff4d5a;
    color: #fff;
}

    </style>
</head>

<body>
    <meu-menu></meu-menu>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">Oferta Mega</div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="menu" id="menu">
            <a href="/">Início</a>
            <a href="pages/achadinhos/">Achadinhos</a>
            <a href="pages/produtos/">Produtos</a>
            <a href="pages/cupons/">Cupons</a>
            <a href="/favoritos/">Favoritos</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>🔥 Achadinhos que valem a pena</h2>
        <p>Ofertas testadas, produtos virais e descontos reais</p>

        <div class="quick-nav">
            <a href="pages/achadinhos/" class="btn-nav btn-achadinhos">
                🔥 Achadinhos
            </a>

            <a href="pages/produtos/" class="btn-nav btn-produtos">
                🛒 Produtos
            </a>

            <a href="pages/cupons/" class="btn-nav btn-cupons">
                💸 Cupons
            </a>
        </div>
    </section>

    <!-- SOCIAL BAR -->
    <div class="social-bar">
        <span>Siga-nos:</span>
        <a href="#" class="social-link">Instagram</a>
        <a href="#" class="social-link">TikTok</a>
        <a href="#" class="social-link">WhatsApp</a>
    </div>

    <!-- PESQUISA -->
    <div class="search-container modern-search">
    <input 
        type="text"
        id="searchInput"
        placeholder="🔍 Buscar achadinhos, ofertas, produtos virais..."
    >
</div>



    <!-- CONTEÚDO -->
    <main class="container">

        <h2 class="section-title">Achadinhos do Dia</h2>

        <div class="products-grid" id="productsGrid">
            <!-- Produtos via JS -->
        </div>

        <div class="pagination" id="pagination">
            <!-- Paginação -->
        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

<script src="/js/footer.js"></script>

    <!-- SCRIPT DOS PRODUTOS -->
<script>
let allProducts = [];
let filteredProducts = [];
const itemsPerPage = 8;
let currentPage = 1;

async function loadProducts() {
    try {
        const response = await fetch('/data/achadinhos.json');

        if (!response.ok) {
            throw new Error("JSON não encontrado");
        }

        allProducts = await response.json();
        filteredProducts = [...allProducts];

        displayProducts();

    } catch (error) {
        console.error("Erro ao carregar JSON:", error);
    }
}

function displayProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = "";

    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;

    const produtosPagina = filteredProducts.slice(start, end);

    produtosPagina.forEach(item => {

        const precoAtual = Number(item.preco);
        const precoAntigo = Number(item.preco_antigo);

        let descontoHTML = "";
        let precoHTML = `<span class="current-price">R$ ${precoAtual.toFixed(2)}</span>`;

        if (!isNaN(precoAntigo) && precoAntigo > precoAtual) {
            const desconto = Math.round(
                ((precoAntigo - precoAtual) / precoAntigo) * 100
            );

            descontoHTML = `<span class="discount-badge">-${desconto}%</span>`;

            precoHTML = `
                <span class="old-price">R$ ${precoAntigo.toFixed(2)}</span>
                <span class="current-price">R$ ${precoAtual.toFixed(2)}</span>
            `;
        }

        grid.innerHTML += `
            <div class="product-card">
                ${descontoHTML}
                <img src="${item.imagem}" alt="${item.titulo}">
                <h4>${item.titulo}</h4>
                ${precoHTML}
                <a href="${item.link}" class="btn-buy" target="_blank">
                    Ver Oferta
                </a>
            </div>
        `;
    });

    setupPagination();
}

function setupPagination() {
    const pageCount = Math.ceil(filteredProducts.length / itemsPerPage);
    const wrapper = document.getElementById('pagination');
    wrapper.innerHTML = "";

    for (let i = 1; i <= pageCount; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = "page-btn" + (i === currentPage ? " active" : "");

        btn.onclick = () => {
            currentPage = i;
            displayProducts();
            window.scrollTo({ top: 0, behavior: "smooth" });
        };

        wrapper.appendChild(btn);
    }
}

document.getElementById('searchInput').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    filteredProducts = allProducts.filter(p =>
        p.titulo.toLowerCase().includes(term)
    );
    currentPage = 1;
    displayProducts();
});

loadProducts();
</script>


</body>
</html>
