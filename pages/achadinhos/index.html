    <style>
        /* Estilos específicos para a página de Achadinhos/Produtos */

/* Cabeçalho do Perfil */
.profile {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 20px 30px;
    text-align: center;
}

.avatar {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--primary), #0ea5e9);
    margin: 0 auto 20px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #001c2a;
    box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
}

.socials {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.socials a {
    color: var(--text-muted);
    font-size: 1.4rem;
    transition: var(--transition);
}

.socials a:hover {
    color: var(--primary);
    transform: translateY(-3px);
}

/* Barra de Busca */
.search-container {
    max-width: 600px;
    margin: 20px auto 40px;
    padding: 0 20px;
}

.search-container input {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    padding: 16px 25px;
    border-radius: 999px; /* Barra arredondada moderna */
    font-size: 1rem;
    transition: var(--transition);
}

.search-container input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-soft);
    background: rgba(255, 255, 255, 0.08);
}

/* Grid de Produtos */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* Card Estilizado */
.card-container {
    perspective: 1000px;
}

.card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    height: 100%;
    position: relative;
    transition: var(--transition);
    animation: fadeIn 0.5s ease backwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.card:hover {
    transform: translateY(-10px);
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.badge {
    position: absolute;
    top: 15px;
    left: 15px;
    background: var(--success);
    color: white;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    z-index: 2;
    text-transform: uppercase;
}

.card-img-wrapper {
    width: 100%;
    aspect-ratio: 1/1; /* Imagens quadradas são melhores para vitrines */
    overflow: hidden;
    background: #fff; /* Fundo branco para imagens transparentes */
}

.card-img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Não corta o produto */
    transition: transform 0.5s ease;
}

.card:hover .card-img-wrapper img {
    transform: scale(1.1);
}

.info {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.title {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 15px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
    color: var(--text-main);
}

.price-row {
    margin-top: auto;
}

.old {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: line-through;
}

.price {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 15px;
}

/* Paginação */
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 50px 0 80px;
}

.pagination button {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-weight: 600;
    transition: var(--transition);
}

.pagination button:hover:not(:disabled) {
    background: var(--primary);
    color: #001c2a;
    border-color: var(--primary);
}

.pagination button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

#page {
    font-weight: 800;
    color: var(--primary);
    background: var(--primary-soft);
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

    <link rel="stylesheet" href="/assets/css/stylebase.css">
</head>
<body>

    <header class="profile">
        <div class="avatar" aria-hidden="true"><i class="fa-solid fa-bolt"></i></div>
        <h1>Baú de Promoções</h1>
        <p>Curadoria profissional das melhores ofertas da internet.</p>

        <nav class="socials" aria-label="Redes Sociais">
            <a href="https://www.instagram.com/baudepromocaos" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@baudepromocoes" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://x.com/baudepromocao" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://www.youtube.com/@BaudePromocoes" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
        </nav>
    </header>

    <section class="search-container">
        <label for="search" class="sr-only" style="display:none">Buscar produtos</label>
        <input type="text" id="search" placeholder="O que você está procurando hoje?">
    </section>

    <main class="grid" id="grid">
        </main>

    <nav class="pagination" aria-label="Navegação de páginas">
        <button id="prev" aria-label="Página anterior"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
        <span id="page" aria-current="page">1</span>
        <button id="next" aria-label="Próxima página">Próxima <i class="fa-solid fa-chevron-right"></i></button>
    </nav>

    <script>
        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const PER_PAGE = 12;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadProducts() {
            try {
                // Adicione o caminho real do seu JSON
                const res = await fetch('data/products.json');
                const data = await res.json();
                allProducts = shuffle(data);
                filteredProducts = [...allProducts];
                render();
            } catch (err) {
                console.error("Erro ao carregar produtos:", err);
                document.getElementById('grid').innerHTML = '<p>No momento não conseguimos carregar as ofertas. Tente novamente mais tarde.</p>';
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * PER_PAGE;
            const end = start + PER_PAGE;

            filteredProducts.slice(start, end).forEach((p, index) => {
                // SEO: Otimização de Imagem com Loading Lazy e Alt Text
                const imgUrl = p.image || p.img || 'placeholder.jpg';
                const productTitle = p.title.replace(/"/g, '&quot;');
                
                grid.insertAdjacentHTML('beforeend', `
                    <article class="card-container">
                        <a href="${p.link}" class="card" target="_blank" rel="noopener noreferrer" style="animation-delay:${index * 0.03}s">
                            <span class="badge">${p.badge || 'OFERTA'}</span>
                            <div class="card-img-wrapper">
                                <img src="${imgUrl}" alt="Oferta: ${productTitle}" loading="lazy">
                            </div>
                            <div class="info">
                                <h2 class="title">${p.title}</h2>
                                <div class="price-row">
                                    ${p.oldPrice ? `<div class="old">De: ${p.oldPrice}</div>` : ''}
                                    <div class="price">Por: R$ ${p.currentPrice || p.price}</div>
                                    <div class="btn">VER OFERTA</div>
                                </div>
                            </div>
                        </a>
                    </article>
                `);
            });

            document.getElementById('page').innerText = currentPage;
            document.getElementById('prev').disabled = currentPage === 1;
            document.getElementById('next').disabled = end >= filteredProducts.length;
        }

        // Filtro com Debounce simples para performance
        let searchTimer;
        document.getElementById('search').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                filteredProducts = allProducts.filter(p => 
                    p.title.toLowerCase().includes(term)
                );
                currentPage = 1;
                render();
            }, 300);
        });

        document.getElementById('prev').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        document.getElementById('next').onclick = () => {
            if ((currentPage * PER_PAGE) < filteredProducts.length) {
                currentPage++;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        loadProducts();
    </script>
    <footer id="footer"></footer>
<script src="/assets/js/main.js" defer></script>
</body>
