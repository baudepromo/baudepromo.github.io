<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Achadinhos - Oferta Mega</title>

    <!-- CSS BASE GLOBAL -->
    <link rel="stylesheet" href="/css/stylebase.css">

    <!-- JS MENU -->
    <script src="/js/menu.js" defer></script>
    <style>
        .modern-search {
    max-width: 650px;
    margin: 30px auto;
    padding: 0 20px;
}

.modern-search input {
    width: 100%;
    padding: 16px 22px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    background: #fff;
    box-shadow: 0 8px 25px rgba(0,0,0,.08);
    outline: none;
    transition: .3s;
}

.modern-search input:focus {
    box-shadow: 0 10px 30px rgba(255,77,90,.25);
}

    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">Oferta Mega</div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="menu" id="menu">
            <a href="/">Início</a>
            <a href="pages/achadinhos/">Achadinhos</a>
            <a href="pages/produtos/">Produtos</a>
            <a href="pages/cupons/">Cupons</a>
            <a href="/favoritos/">Favoritos</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>🔥 Achadinhos que valem a pena</h2>
        <p>Ofertas testadas, produtos virais e descontos reais</p>

        <div class="quick-nav">
            <a href="pages/achadinhos/" class="btn-nav btn-achadinhos">
                🔥 Achadinhos
            </a>

            <a href="pages/produtos/" class="btn-nav btn-produtos">
                🛒 Produtos
            </a>

            <a href="pages/cupons/" class="btn-nav btn-cupons">
                💸 Cupons
            </a>
        </div>
    </section>

    <!-- SOCIAL BAR -->
    <div class="social-bar">
        <span>Siga-nos:</span>
        <a href="#" class="social-link">Instagram</a>
        <a href="#" class="social-link">TikTok</a>
        <a href="#" class="social-link">WhatsApp</a>
    </div>

    <!-- PESQUISA -->
    <div class="search-container modern-search">
    <input 
        type="text"
        id="searchInput"
        placeholder="🔍 Buscar achadinhos, ofertas, produtos virais..."
    >
</div>



    <!-- CONTEÚDO -->
    <main class="container">

        <h2 class="section-title">Achadinhos do Dia</h2>

        <div class="products-grid" id="productsGrid">
            <!-- Produtos via JS -->
        </div>

        <div class="pagination" id="pagination">
            <!-- Paginação -->
        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

<script>
function displayProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = "";

    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;

    const produtosPagina = filteredProducts.slice(start, end);

    produtosPagina.forEach(item => {

        const precoAtual = Number(item.preco);
        const precoAntigo = Number(item.preco_antigo);

        let descontoHTML = "";
        let precoHTML = `<p class="current-price">R$ ${precoAtual.toFixed(2)}</p>`;

        if (precoAntigo && precoAntigo > precoAtual) {
            const desconto = Math.round(
                ((precoAntigo - precoAtual) / precoAntigo) * 100
            );

            descontoHTML = `<span class="discount-badge">-${desconto}%</span>`;

            precoHTML = `
                <span class="old-price">R$ ${precoAntigo.toFixed(2)}</span>
                <span class="current-price">R$ ${precoAtual.toFixed(2)}</span>
            `;
        }

        grid.innerHTML += `
            <div class="product-card">
                ${descontoHTML}
                <img src="${item.imagem}" alt="${item.titulo}">
                <h4>${item.titulo}</h4>

                ${precoHTML}

                <a href="${item.link}" class="btn-buy" target="_blank">
                    Ver Oferta
                </a>
            </div>
        `;
    });

    setupPagination();
}
</script>


</body>
</html>
