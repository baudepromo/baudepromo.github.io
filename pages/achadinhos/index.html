<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Achadinhos - Oferta Mega</title>

    <!-- CSS BASE GLOBAL -->
    <link rel="stylesheet" href="/css/stylebase.css">

     <link rel="stylesheet" href="/css/pages/achadinhos.css">
</head>

<body>
    <meu-menu></meu-menu>

    <!-- HERO -->
    <section class="hero">
        <h2>🔥 Achadinhos que valem a pena</h2>
        <p>Ofertas testadas, produtos virais e descontos reais</p>

        <div class="quick-nav">
            <a href="pages/achadinhos/" class="btn-nav btn-achadinhos">
                🔥 Achadinhos
            </a>

            <a href="pages/produtos/" class="btn-nav btn-produtos">
                🛒 Produtos
            </a>

            <a href="pages/cupons/" class="btn-nav btn-cupons">
                💸 Cupons
            </a>
        </div>
    </section>

    <!-- SOCIAL BAR -->
    <div class="social-bar">
    <span>Siga-nos:</span>

    <a href="#" class="social-link instagram">Instagram</a>
    <a href="#" class="social-link tiktok">TikTok</a>
    <a href="#" class="social-link whatsapp">WhatsApp</a>
</div>

    <!-- PESQUISA -->
    <div class="search-container modern-search">
    <input 
        type="text"
        id="searchInput"
        placeholder="🔍 Buscar achadinhos, ofertas, produtos virais..."
    >
</div>



    <!-- CONTEÚDO -->
    <main class="container">

        <h2 class="section-title">Achadinhos do Dia</h2>

        <div class="products-grid" id="productsGrid">
            <!-- Produtos via JS -->
        </div>

        <div class="pagination" id="pagination">
            <!-- Paginação -->
        </div>

    </main>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>


    <!-- SCRIPT DOS PRODUTOS -->
<script src="/js/pages/achadinhos.js"></script>
    <!-- All Scripts -->
    <script src="/js/main-layout.js" defer></script>

</body>
</html>
