<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Baú de Promoções | Melhores Achadinhos e Ofertas</title>
    <meta name="description" content="Encontre as melhores ofertas, promoções e achadinhos da internet.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VNJR25033"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4VNJR25033');
    </script>
    <link rel="stylesheet" href="/css/stylebase.css">
    <style>
    /* --- AJUSTES EXCLUSIVOS DA PÁGINA DE PRODUTOS --- */

    /* Barra de Busca - Específico para encaixe na Hero */
    .search-container {
        max-width: 600px;
        margin: -25px auto 40px; /* Sobe um pouco para sobrepor o final da curva da hero */
        padding: 0 20px;
        position: relative;
        z-index: 10;
    }

    .search-container input {
        width: 100%;
        padding: 16px 25px;
        border-radius: 99px;
        border: none;
        font-size: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        outline: none;
        transition: 0.3s;
    }

    .search-container input:focus {
        transform: scale(1.02);
        box-shadow: 0 10px 30px rgba(255, 75, 75, 0.2);
    }

    /* Grid de Produtos - Ajustes de espaçamento */
    .main-content {
        padding-top: 20px;
    }

    /* Ajuste da Imagem dentro do Card (para não cortar o produto) */
    .card img {
        width: 100%;
        height: 220px;
        object-fit: contain; /* 'contain' é melhor para produtos (não corta) */
        background: #fff;
        padding: 10px;
    }

    /* Título do Produto com limite de linhas (para manter o alinhamento) */
    .card h3 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 2.4em;
        line-height: 1.2;
        margin: 10px 0;
    }

    /* Paginação Customizada */
    .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin: 50px 0;
    }

    .pagination button {
        border: none;
        cursor: pointer;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
    }

    .pagination button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    #page {
        font-weight: 800;
        color: var(--accent-black);
        background: var(--accent-yellow);
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
    }

    /* Animação de entrada dos cards */
    .card {
        animation: fadeIn 0.5s ease backwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

    <header class="top-bar">
        <a href="/" class="logo"><i class="fa-solid fa-box-open"></i> Baú de Promo</a>
        <button class="hamburger-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <nav class="mobile-menu" id="sideMenu">
        <button class="close-menu" onclick="toggleMenu()">&times;</button>
        <a href="/">Início</a>
        <a href="/achadinhos">🛒 Achadinhos Shopee</a>
        <a href="/cupons">🎟️ Cupons</a>
        <a href="/produtos">🔥 Melhores Produtos</a>
        <a href="/contatos">💬 Contato</a>
    </nav>

    <section class="hero-mini">
        <h1>Ofertas & Achadinhos</h1>
        <p style="font-size: 0.9rem; opacity: 0.9;">Curadoria diária das melhores promoções.</p>
        
        <div class="social-pills">
            <a href="https://www.instagram.com/baudepromocaos" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@baudepromocoes" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://x.com/baudepromocao" class="social-link"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://whatsapp.com/channel/..." class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <div class="search-wrapper">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="search" placeholder="O que você procura hoje? (Ex: iPhone, Ventilador...)">
        </div>
    </section>

    <main class="grid-container">
        <div class="grid" id="grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Carregando ofertas...
            </div>
        </div>

        <nav class="pagination" aria-label="Navegação">
            <button id="prev" aria-label="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="page">1</span>
            <button id="next" aria-label="Próxima"><i class="fa-solid fa-chevron-right"></i></button>
        </nav>
    </main>

    <script>
        // Toggle Menu
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        // Lógica dos Produtos
        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const PER_PAGE = 12;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadProducts() {
            try {
                // ATENÇÃO: Verifique se o caminho data/products.json está correto no seu projeto
                const res = await fetch('data/products.json');
                if (!res.ok) throw new Error("Erro ao buscar JSON");
                
                const data = await res.json();
                allProducts = shuffle(data);
                filteredProducts = [...allProducts];
                render();
            } catch (err) {
                console.error(err);
                document.getElementById('grid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <p>Ops! Não conseguimos carregar as ofertas agora.</p>
                        <button onclick="location.reload()" style="padding:10px 20px; margin-top:10px; border:none; background:#ff4b4b; color:white; border-radius:5px; cursor:pointer;">Tentar Novamente</button>
                    </div>
                `;
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">Nenhum produto encontrado.</div>';
                return;
            }

            const start = (currentPage - 1) * PER_PAGE;
            const end = start + PER_PAGE;

            // Renderiza os Cards com o NOVO DESIGN
            filteredProducts.slice(start, end).forEach((p, index) => {
                const imgUrl = p.image || p.img || 'https://via.placeholder.com/300?text=Sem+Imagem';
                const productTitle = p.title.replace(/"/g, '&quot;');
                
                // Formatação de preço segura (caso venha number ou string)
                let displayPrice = p.currentPrice || p.price;
                if(typeof displayPrice === 'number') displayPrice = displayPrice.toFixed(2).replace('.', ',');

                grid.insertAdjacentHTML('beforeend', `
                    <a href="${p.link}" class="card" target="_blank" rel="noopener noreferrer">
                        <span class="badge">${p.badge || '🔥 OFERTA'}</span>
                        <div class="card-img-wrapper">
                            <img src="${imgUrl}" alt="${productTitle}" loading="lazy">
                        </div>
                        <div class="card-info">
                            <h3 class="card-title">${p.title}</h3>
                            <div class="price-box">
                                ${p.oldPrice ? `<span class="old-price">De: ${p.oldPrice}</span>` : ''}
                                <span class="current-price">R$ ${displayPrice}</span>
                            </div>
                            <span class="btn-view">VER OFERTA</span>
                        </div>
                    </a>
                `);
            });

            // Atualiza Paginação
            document.getElementById('page').innerText = currentPage;
            document.getElementById('prev').disabled = currentPage === 1;
            document.getElementById('next').disabled = end >= filteredProducts.length;
        }

        // Filtro de Busca
        let searchTimer;
        document.getElementById('search').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                filteredProducts = allProducts.filter(p => 
                    p.title.toLowerCase().includes(term)
                );
                currentPage = 1;
                render();
            }, 300);
        });

        document.getElementById('prev').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        document.getElementById('next').onclick = () => {
            if ((currentPage * PER_PAGE) < filteredProducts.length) {
                currentPage++;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        loadProducts();
    </script>
    
    <footer id="footer"></footer>
    <script src="/js/main.js" defer></script>
</body>
</html>
