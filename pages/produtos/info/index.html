<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | Baú de Promoções</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/img/favicon.webp"/>
    <link rel="stylesheet" href="/css/stylebase.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VNJR25033"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4VNJR25033');
    </script>

    <style>
        /* --- SEU CSS ORIGINAL (ADAPTADO) --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #ff4b4b 0%, #ff9000 100%);
            --bg-body: #f5f5f5;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --white: #ffffff;
            --accent-yellow: #fdd835;
            --accent-black: #111111;
            --success: #00c853; /* Verde para preço */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER SUPERIOR --- */
        header.top-bar {
            background: #ff4b4b;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); transform: translateX(-3px); }

        /* --- CONTAINER PRINCIPAL --- */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- CARD DE DETALHES (Novo Design) --- */
        .detail-card {
            background: var(--white);
            border-radius: 30px;
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); /* Sombra suave */
            min-height: 600px;
            position: relative;
        }

        /* Lado da Imagem */
        .img-side {
            background: #fff0f0; /* Um fundo bem clarinho avermelhado ou cinza */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .img-side img {
            max-width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            mix-blend-mode: multiply; /* Ajuda a tirar fundo branco da imagem se houver */
        }
        .detail-card:hover .img-side img { transform: scale(1.05); }

        /* Lado da Info */
        .info-side {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .store-tag {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #ff4b4b; /* Cor primária */
            margin-bottom: 10px;
            background: #fff0f0;
            padding: 5px 12px;
            border-radius: 6px;
            align-self: flex-start;
        }

        h1 {
            font-size: 2.2rem;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .price-wrapper { margin: 20px 0 30px; }
        .price-label { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 5px; }
        .price-tag { 
            font-size: 3.5rem; 
            font-weight: 800; 
            color: var(--success); /* Verde para preço */
            display: flex; 
            align-items: flex-start; 
            gap: 5px; 
            line-height: 1;
        }
        .price-tag span { font-size: 1.5rem; margin-top: 8px; color: var(--text-dark); }

        /* Benefícios */
        .benefits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 12px;
            background: #f9f9f9;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .benefit-item i { color: #ff9000; font-size: 1.1rem; }

        /* Botão de Ação (Estilo Pill do seu CSS) */
        .cta-button {
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 50px; /* Pill shape */
            font-weight: 700;
            font-size: 1.2rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(255, 75, 75, 0.3);
            border: none;
            cursor: pointer;
            display: block;
            margin-top: auto;
        }
        .cta-button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(255, 75, 75, 0.4); 
        }

        /* Favoritos e Share flutuantes (Adaptado para fundo claro) */
        .floating-actions {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }
        .icon-btn {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: none;
            background: white;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .icon-btn:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        /* Estados Ativos */
        .icon-btn.heart-btn.active { color: #ff4747; background: #ffebeb; }
        .icon-btn.alert-btn.active { color: #ffb300; background: #fff8e1; }

        /* Spinner de Carregamento */
        .loading-container {
            grid-column: span 2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            padding: 50px;
        }

        /* Toast Moderno */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; color: #fff; padding: 15px 30px;
            border-radius: 100px; font-weight: 600; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 10px;
            visibility: hidden; opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { visibility: visible; bottom: 40px; opacity: 1; }

        /* Modal Login (Adaptado) */
        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); 
            z-index: 9999; align-items: center; justify-content: center;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .detail-card { grid-template-columns: 1fr; border-radius: 20px; min-height: auto; margin: 10px; }
            .img-side { height: 350px; padding: 20px; }
            .info-side { padding: 30px 25px; }
            h1 { font-size: 1.6rem; }
            .price-tag { font-size: 2.8rem; }
            .benefits-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <a href="/" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Voltar</a>
        <div style="color: white; font-weight: 800; font-size: 1.2rem; margin-left: auto;">BAÚ DE PROMOÇÕES</div>
    </header>

    <div class="main-container">
        <div id="content-area" class="detail-card">
            <div class="loading-container">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #ff4b4b;"></i>
                <p style="margin-top: 20px; color: var(--text-muted); font-weight: 600;">Carregando melhor oferta...</p>
            </div>
        </div>
    </div>

    <div id="toast-box" class="toast"></div>

    <div id="login-modal" class="modal-overlay">
        <div style="background: white; padding: 40px; border-radius: 25px; text-align: center; max-width: 380px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.2);">
            <div style="width: 70px; height: 70px; background: #fff0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fa-solid fa-user-lock" style="color: #ff4b4b; font-size: 2rem;"></i>
            </div>
            <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; color: #1a1a1a;">Faça Login</h2>
            <p style="color: var(--text-muted); line-height: 1.5; margin-bottom: 30px; font-size: 0.95rem;">Para salvar favoritos e criar alertas, precisamos saber quem é você.</p>
            
            <button id="btn-google-login" style="width: 100%; background: #1a1a1a; color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                Entrar com Google
            </button>

            <button onclick="document.getElementById('login-modal').style.display='none'" style="background: transparent; border: none; color: #666; margin-top: 20px; cursor: pointer; font-weight: 600; font-size: 0.9rem;">
                Cancelar
            </button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAltYkTpdrIShVv7wJXsszQqvOZXTC45Wg",
        authDomain: "baudepromocao-oficial.firebaseapp.com",
        projectId: "baudepromocao-oficial",
        storageBucket: "baudepromocao-oficial.firebasestorage.app",
        messagingSenderId: "743146859125",
        appId: "1:743146859125:web:6d1f5331e22b8ce981263c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // --- FUNÇÃO DE LOGIN ---
    const btnLogin = document.getElementById('btn-google-login');
    if(btnLogin) {
        btnLogin.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                document.getElementById('login-modal').style.display = 'none';
                showToast(`Bem-vindo, ${result.user.displayName.split(' ')[0]}!`);
            } catch (error) {
                console.error("Erro login:", error);
                showToast("Erro ao fazer login");
            }
        });
    }

    // --- TOGGLE COLLECTIONS ---
    async function toggleCollection(collectionName, productId, elementId, activeClass, successMsg, removedMsg) {
        if (!auth.currentUser) {
            document.getElementById('login-modal').style.display = 'flex';
            return;
        }

        const btn = document.getElementById(elementId);
        const userRef = doc(db, collectionName, auth.currentUser.uid);
        const wasActive = btn.classList.contains('active');

        try {
            btn.classList.toggle('active'); 
            
            const snap = await getDoc(userRef);
            
            if (!wasActive) {
                if (!snap.exists()) {
                    await setDoc(userRef, { email: auth.currentUser.email, items: [String(productId)], updatedAt: new Date() });
                } else {
                    await updateDoc(userRef, { items: arrayUnion(String(productId)) });
                }
                showToast(successMsg);
            } else {
                await updateDoc(userRef, { items: arrayRemove(String(productId)) });
                showToast(removedMsg);
            }
        } catch (e) {
            console.error(`Erro em ${collectionName}:`, e);
            btn.classList.toggle('active');
            showToast("Erro na operação.");
        }
    }

    window.toggleWishlist = (pid, eid) => toggleCollection("wishlists", pid, eid, "active", "Salvo nos favoritos ❤️", "Removido dos favoritos");
    window.toggleAlert = (pid, eid) => toggleCollection("alerts", pid, eid, "active", "Alerta criado! 🔔", "Alerta removido");

    // --- SHARE LINK ---
    window.shareLink = async (title, url) => {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Baú de Promoções',
                    text: `Olha essa oferta: ${title}`,
                    url: url
                });
            } catch (err) { console.log('Share cancelado'); }
        } else {
            try {
                await navigator.clipboard.writeText(url);
                showToast("Link copiado! 📋");
            } catch (err) { showToast("Erro ao copiar link."); }
        }
    };

    // --- CARREGAMENTO DO PRODUTO (LAYOUT NOVO) ---
async function loadProductDetails() {
    const params = new URLSearchParams(window.location.search);
    const encodedId = params.get('id');
    const contentArea = document.getElementById("content-area");

    if (!encodedId) return;

    try {
        function decodeBase64(str) {
            return decodeURIComponent(
                Array.prototype.map.call(atob(str), c =>
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join('')
            );
        }

        const productId = decodeBase64(encodedId);

        const res = await fetch('/data/produtos.json');
        const products = await res.json();

        const product = products.find(p => String(p.id) === productId);

        if (!product) {
            contentArea.innerHTML =
                "<div class='loading-container'><h2>Oferta expirada!</h2></div>";
            return;
        }

        const safeId = btoa(unescape(encodeURIComponent(productId)))
            .replace(/[^a-zA-Z0-9]/g, '');

        const heartId = "heart_" + safeId;
        const alertId = "alert_" + safeId;

        contentArea.innerHTML = `
            <div class="img-side">
                <div class="floating-actions">
                    <button id="${heartId}" class="icon-btn heart-btn"
                        onclick="toggleWishlist('${product.id}', '${heartId}')">
                        <i class="fa-solid fa-heart"></i>
                    </button>

                    <button id="${alertId}" class="icon-btn alert-btn"
                        onclick="toggleAlert('${product.id}', '${alertId}')">
                        <i class="fa-solid fa-bell"></i>
                    </button>

                    <button class="icon-btn"
                        onclick="shareLink('${product.title.replace(/'/g, "\\'")}', location.href)">
                        <i class="fa-solid fa-share-nodes"></i>
                    </button>
                </div>

                <img src="${product.img}" alt="${product.title}">
            </div>

            <div class="info-side">
                <span class="store-tag">
                    <i class="fa-solid fa-shop"></i> ${product.store}
                </span>

                <h1>${product.title}</h1>

                <div class="price-wrapper">
                    <p class="price-label">Melhor preço encontrado:</p>
                    <div class="price-tag">
                        <span>R$</span> ${product.price}
                    </div>
                </div>

                <div class="benefits-grid">
                    <div class="benefit-item"><i class="fa-solid fa-truck-fast"></i> Frete Grátis</div>
                    <div class="benefit-item"><i class="fa-solid fa-shield-check"></i> Compra Segura</div>
                    <div class="benefit-item"><i class="fa-solid fa-credit-card"></i> Parcelamento</div>
                    <div class="benefit-item"><i class="fa-solid fa-check-circle"></i> Original</div>
                </div>

                <a href="${product.link}" target="_blank" class="cta-button">
                    Ir para a Loja
                    <i class="fa-solid fa-arrow-up-right-from-square" style="margin-left:8px"></i>
                </a>
            </div>
        `;

        if (auth.currentUser) {
            checkStatus("wishlists", productId, heartId);
            checkStatus("alerts", productId, alertId);
        }

    } catch (e) {
        console.error("Erro:", e);
        contentArea.innerHTML =
            "<div class='loading-container'><h2>Erro ao carregar oferta.</h2></div>";
    }
}



    async function checkStatus(collectionName, productId, elementId) {
        if(!auth.currentUser) return;
        try {
            const snap = await getDoc(doc(db, collectionName, auth.currentUser.uid));
            if (snap.exists() && snap.data().items?.includes(String(productId))) {
                document.getElementById(elementId)?.classList.add('active');
            }
        } catch(e) { console.log(e); }
    }

    window.showToast = (msg) => {
        const toast = document.getElementById('toast-box');
        toast.innerHTML = `<i class="fa-solid fa-info-circle"></i> ${msg}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    onAuthStateChanged(auth, (user) => { 
        loadProductDetails(); 
    });

</script>

</body>
</html>
