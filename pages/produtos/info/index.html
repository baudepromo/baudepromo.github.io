<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - Baú de Promoções</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }
        .product-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .info-title { font-size: 28px; color: var(--dark); margin-bottom: 10px; }
        .info-price { font-size: 32px; color: var(--primary); font-weight: 800; margin: 20px 0; }
        .description-text { line-height: 1.8; color: #555; margin-bottom: 30px; }
        
        @media (max-width: 768px) {
            .product-detail-container { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">BAUDEPROMO</div>
        <a href="javascript:history.back()" style="color:white; text-decoration:none;">⬅ Voltar</a>
    </header>

    <section class="hero" style="height: 200px; padding: 40px;"></section>

    <main class="container">
        <div class="product-detail-container" id="productContent">
            <p>Carregando detalhes...</p>
        </div>
    </main>

    <script>
        async function loadProductDetail() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            try {
                const response = await fetch('/data/produtos.json');
                const products = await response.json();
                const product = products.find(p => p.id == productId);

                if (product) {
                    renderDetail(product);
                }
            } catch (error) {
                console.error("Erro:", error);
            }
        }

        function renderDetail(p) {
            // Aqui codificamos o link final em Base64 para a página intermediária
            const encodedLink = btoa(p.link);
            const finalRedirect = `/pages/ir.html?ref=${encodedLink}`;

            document.getElementById('productContent').innerHTML = `
                <div class="product-image">
                    <img src="${p.imagem}" alt="${p.nome}">
                </div>
                <div class="product-info">
                    <span class="category-badge" style="background:var(--secondary); color:white; padding:5px 15px; border-radius:50px;">${p.categoria}</span>
                    <h1 class="info-title">${p.nome}</h1>
                    <p class="old-price">De: R$ ${p.precoAntigo}</p>
                    <p class="info-price">Por: R$ ${p.precoAtual}</p>
                    
                    <div class="description-text">
                        <h3>Sobre este achadinho:</h3>
                        <p>${p.descricao || "Este produto é um dos nossos favoritos! Testado e aprovado pela equipe do Baú."}</p>
                    </div>

                    <a href="${finalRedirect}" class="btn-nav btn-produtos" style="opacity:1; width:100%; justify-content:center; font-size:20px; padding:20px;">
                        🛒 PEGAR ESSA PROMOÇÃO
                    </a>
                </div>
            `;
        }

        window.onload = loadProductDetail;
    </script>
</body>
</html>
