    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ShoppingCenter",
      "name": "Baú de Promoção",
      "description": "Agregador das melhores ofertas de grandes marketplaces.",
      "url": "https://baudepromo.github.io"
    }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/img/favicon.webp"/>
    
    <style>
        /* MANTIVE SEUS ESTILOS ORIGINAIS INTEGRALMENTE */
        :root {
            --bg-body: #0a0f18;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #3b82f6;
            --shopee: #ff4d2d;
            --amazon: #ff9900;
            --aliexpress: #ff4747;
            --mercado-livre: #ffe600;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(147, 51, 234, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px; background: var(--glass-bg); backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border); display: flex; flex-direction: column;
            padding: 30px 20px; position: fixed; height: 100vh; z-index: 100;
        }
        .logo-sidebar { text-align: center; margin-bottom: 40px; text-decoration: none; color: inherit; display: block; }
        .logo-sidebar:hover { opacity: 0.9; }
        .logo-sidebar img { width: 70px; height: 70px; border-radius: 20px; border: 2px solid var(--primary-accent); padding: 5px; margin-bottom: 15px; }
        .logo-sidebar h2 { font-size: 1.2rem; font-weight: 800; color: white; }
        .menu { display: flex; flex-direction: column; gap: 8px; }
        .tab-btn {
            background: transparent; border: none; color: var(--text-muted); padding: 14px 18px;
            text-align: left; font-size: 0.95rem; font-weight: 500; cursor: pointer; border-radius: 12px;
            transition: all 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .tab-btn.active { background: var(--primary-accent); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        .main-content { flex: 1; margin-left: 260px; padding: 40px; }
        header { margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between; align-items: center; }
        h1 { font-size: 2rem; font-weight: 800; }

        .search-container { position: relative; width: 100%; max-width: 400px; }
        .search-container input {
            width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 12px 20px 12px 45px; border-radius: 100px; color: white; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--primary-accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; overflow: hidden; transition: all 0.4s ease; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .img-container { width: 100%; height: 200px; background: #fff; overflow: hidden; position: relative;}
        .product-img { width: 100%; height: 100%; object-fit: contain; padding: 20px; transition: transform 0.5s ease; }
        .product-card:hover .product-img { transform: scale(1.08); }
        .product-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .store-badge { font-size: 0.7rem; font-weight: 700; padding: 5px 12px; border-radius: 100px; text-transform: uppercase; margin-bottom: 12px; display: inline-block; width: fit-content; }
        .badge-amazon { background: var(--amazon); color: #000; }
        .badge-shopee { background: var(--shopee); color: #fff; }
        .badge-aliexpress { background: var(--aliexpress); color: #fff; }
        .badge-mercadolivre { background: var(--mercado-livre); color: #000; }
        .product-title { font-size: 1rem; font-weight: 600; color: var(--text-main); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-container { margin-top: auto; display: flex; align-items: center; justify-content: space-between; }
        .product-price { font-size: 1.2rem; font-weight: 800; color: #4ade80; }
        .btn-buy { background: white; color: black; text-decoration: none; padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; transition: 0.3s; }
        .btn-buy:hover { background: var(--primary-accent); color: white; }

        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .logo-sidebar h2, .tab-btn span { display: none; }
            .main-content { margin-left: 80px; padding: 20px; }
            .tab-btn { justify-content: center; padding: 15px; }
        }
        @media (max-width: 600px) {
            .sidebar { bottom: 0; width: 100%; height: 70px; flex-direction: row; border-right: none; border-top: 1px solid var(--glass-border); padding: 0; justify-content: space-around; position: fixed; top: auto; }
            .logo-sidebar { display: none; }
            .menu { flex-direction: row; width: 100%; justify-content: space-around; }
            .main-content { margin-left: 0; margin-bottom: 80px; padding: 20px; }
            .search-container { max-width: 100%; }
        }

        .favoritos-btn { margin-top: 20px; background: linear-gradient(135deg, #ff5f6d, #ff4747); color: white !important; font-weight: 700; box-shadow: 0 8px 25px rgba(255, 71, 71, 0.35); text-decoration: none; }
        .favoritos-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255, 71, 71, 0.5); }
    </style>
</head>
<body>

<aside class="sidebar" role="navigation" aria-label="Menu Lateral">
    <a href="https://baudepromo.github.io" class="logo-sidebar">
        <img src="/assets/img/perfil.webp" alt="Logotipo Baú de Promoções">
        <h2>Baú de Promoções</h2>
    </a>

    <nav class="menu">
        <button class="tab-btn active" data-tab="eletronicos" aria-label="Ver Eletrônicos"><i class="fa-solid fa-bolt" aria-hidden="true"></i> <span>Eletrônicos</span></button>
        <button class="tab-btn" data-tab="casa" aria-label="Ver Casa"><i class="fa-solid fa-house" aria-hidden="true"></i> <span>Casa</span></button>
        <button class="tab-btn" data-tab="cozinha" aria-label="Ver Cozinha"><i class="fa-solid fa-cookie" aria-hidden="true"></i> <span>Cozinha</span></button>
        <button class="tab-btn" data-tab="moda" aria-label="Ver Moda"><i class="fa-solid fa-shirt" aria-hidden="true"></i> <span>Moda</span></button>
        <button class="tab-btn" data-tab="beleza" aria-label="Ver Beleza"><i class="fa-solid fa-person" aria-hidden="true"></i> <span>Beleza</span></button>
        <button class="tab-btn" data-tab="saude" aria-label="Ver Saúde"><i class="fa-solid fa-heart" aria-hidden="true"></i> <span>Saúde</span></button>
        <a href="favoritos.html" class="tab-btn favoritos-btn">
            <i class="fa-solid fa-heart" aria-hidden="true"></i>
            <span>Meus Favoritos</span>
        </a>
    </nav>
</aside>

<main class="main-content">
    <header>
        <a href="https://baudepromo.github.io" class="btn-voltar" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
            <i class="fa-solid fa-arrow-left"></i> Voltar para início
        </a>

        <section class="intro">
            <h1>Produtos em Promoção 🔥</h1>
            <p>Confira as melhores ofertas curadas das principais lojas do Brasil.</p>
        </section>
        
        <div class="search-container">
            <label for="search-input" class="sr-only" style="display:none">Buscar produtos</label>
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="O que você procura hoje?">
        </div>
    </header>
    
    <section id="product-grid" class="product-grid" aria-live="polite">
        </section>
</main>

<script>
    const productGrid = document.getElementById("product-grid");
    const searchInput = document.getElementById("search-input");
    let allProducts = []; 
    let currentCategory = "eletronicos";

    async function loadAndDisplay() {
        try {
            const response = await fetch('products.json'); 
            const data = await response.json(); 
            
            allProducts = data.map((p, index) => ({
                ...p,
                id: p.id !== undefined ? p.id : index 
            }));

            renderProducts(allProducts.filter(p => p.category === currentCategory));
        } catch (erro) {
            console.error("Erro ao carregar produtos:", erro);
            productGrid.innerHTML = "<p style='padding:20px'>Erro ao carregar ofertas. Verifique sua conexão.</p>";
        }
    }

    function renderProducts(lista) {
        productGrid.innerHTML = "";
        
        if(lista.length === 0) {
            productGrid.innerHTML = "<p style='padding:20px; grid-column:span 4; text-align:center'>Nenhum produto encontrado nesta categoria.</p>";
            return;
        }

        lista.forEach(p => {
            const idMascarado = btoa(unescape(encodeURIComponent(p.id)));

            // Melhora SEO: Adicionando atributos alt dinâmicos e títulos semânticos (h3)
            const card = document.createElement("article"); // Mudado para article para melhor semântica
            card.className = "product-card";
            card.innerHTML = `
                <div class="img-container">
                    <img src="${p.img}" alt="Oferta: ${p.title}" class="product-img" loading="lazy">
                </div>
                <div class="product-info">
                    <span class="store-badge badge-${p.store.toLowerCase().replace(/\s/g, '')}">${p.store}</span>
                    <h3 class="product-title">${p.title}</h3>
                    <div class="price-container">
                        <p class="product-price" aria-label="Preço: R$ ${p.price}">R$ ${p.price}</p>
                        <a href="detalhes.html?id=${idMascarado}" class="btn-buy" title="Ver detalhes de ${p.title}">Ver Detalhes</a>
                    </div>
                </div>
            `;
            productGrid.appendChild(card);
        });
    }

    document.querySelectorAll("button.tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.tab;
            searchInput.value = ""; 
            renderProducts(allProducts.filter(p => p.category === currentCategory));
        });
    });

    searchInput.addEventListener("input", (e) => {
        const termo = e.target.value.toLowerCase();
        if (termo === "") {
            renderProducts(allProducts.filter(p => p.category === currentCategory));
        } else {
            const filtrados = allProducts.filter(p => p.title.toLowerCase().includes(termo));
            renderProducts(filtrados);
        }
    });

    loadAndDisplay();
</script>
</body>
</html>
