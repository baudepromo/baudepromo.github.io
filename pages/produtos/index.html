<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos - Categorias</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/pages/produtos.css">
    <style>
        /* BARRA DE PESQUISA TRANSPARENTE */
        .modern-search {
            position: sticky;
            top: 80px;
            z-index: 900;
            background: transparent;
            padding: 15px 20px;
        }
        .modern-search input {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,0,0,0.1);
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        /* FILTROS */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 22px;
            border-radius: 50px;
            border: 2px solid var(--primary, #ff4d5a);
            background: white;
            color: var(--primary, #ff4d5a);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .filter-btn.active {
            background: var(--primary, #ff4d5a);
            color: white;
        }

        /* CARD DO PRODUTO */
        .product-card {
            animation: fadeIn 0.4s ease forwards;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .discount-badge {
            background: #ff4d5a;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            align-self: flex-start;
        }

        .btn-oferta {
            display: block;
            text-align: center;
            margin-top: auto;
            text-decoration: none;
            background: #ff4d5a;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-oferta:hover {
            background: #e64450;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">BAUDEPROMO</div>
        <button class="hamburger" id="menuToggle">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="modern-search">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="🔍 Buscar por nome ou categoria..."
            onkeyup="searchProducts()"
        >
    </div>

    <main class="container">
        <h2 class="section-title">Explore por Categorias</h2>
        
        <div class="filter-container" id="filterBar">
            <button class="filter-btn active" onclick="filterProducts('Todos', event)">✨ Todos</button>
            <button class="filter-btn" onclick="filterProducts('Eletrônicos', event)">📱 Eletrônicos</button>
            <button class="filter-btn" onclick="filterProducts('Moda', event)">👕 Moda</button>
            <button class="filter-btn" onclick="filterProducts('Cozinha', event)">🍳 Cozinha</button>
        </div>

        <div class="products-grid" id="productDisplay"></div>
    </main>

    <script src="/js/main-layout.js" defer></script>

    <script>
        let allProducts = [];

        // 1. Carrega os produtos do arquivo JSON
        async function loadProducts() {
            try {
                const req = await fetch('/data/produtos.json');
                if (!req.ok) throw new Error(`Erro: ${req.status}`);
                
                allProducts = await req.json();
                displayProducts(allProducts);
            } catch (error) {
                console.error("Erro ao carregar JSON:", error);
                document.getElementById('productDisplay').innerHTML = "<p>Erro ao carregar produtos.</p>";
            }
        }

        // 2. Renderiza os produtos na tela
        function displayProducts(products) {
            const grid = document.getElementById('productDisplay');
            
            if (products.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; padding: 50px;">Nenhum produto encontrado. 😕</p>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                // Link para a página de detalhes/info
                const finalUrl = `/pages/produtos/info/index.html?id=${p.id}`;

                return `
                <div class="product-card">
                    <span class="discount-badge">OFF</span>
                    
                    <img src="${p.imagem}" alt="${p.nome}" style="width:100%; height:180px; object-fit:contain; margin: 10px 0;">
                    
                    <span class="category-badge" style="font-size:11px; color:#888;">${p.categoria}</span>
                    <h4 style="margin: 8px 0; min-height: 40px;">${p.nome}</h4>
                    
                    <div style="margin-bottom: 15px;">
                        <span class="old-price" style="text-decoration:line-through; color:#999; font-size:13px;">R$ ${p.precoAntigo}</span><br>
                        <span class="current-price" style="font-size:18px; font-weight:bold; color:#ff4d5a;">R$ ${p.precoAtual}</span>
                    </div>
                    
                    <a href="${finalUrl}" class="btn-oferta">Ver Oferta</a>
                </div>
                `;
            }).join('');
        }

        // 3. Função da Barra de Pesquisa
        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.nome.toLowerCase().includes(searchTerm) || 
                p.categoria.toLowerCase().includes(searchTerm)
            );
            displayProducts(filtered);
        }

        // 4. Função de Filtro por Categoria
        function filterProducts(category, event) {
            // Limpa a busca ao filtrar
            document.getElementById('searchInput').value = '';
            
            // Atualiza botões ativos
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            if(category === 'Todos') {
                displayProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.categoria === category);
                displayProducts(filtered);
            }
        }

        // Iniciar carregamento
        window.onload = loadProducts;
    </script>
</body>
</html>
