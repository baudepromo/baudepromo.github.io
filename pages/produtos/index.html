<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos - Categorias</title>
    <link rel="stylesheet" href="/css/stylebase.css">
    <style>
    /* PERFIL E MENU */
    .profile-area {
        text-align: center;
        width: 100%;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .profile-img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid #fff;
        object-fit: cover;
        margin-bottom: 10px;
    }

    /* BARRA DE PESQUISA TRANSPARENTE */
    .modern-search {
        position: sticky;
        top: 80px;
        z-index: 900;
        background: transparent; /* Removido fundo sólido */
        padding: 15px 20px;
    }
    .modern-search input {
        background: rgba(255, 255, 255, 0.9); /* Branco levemente transparente */
        backdrop-filter: blur(5px); /* Efeito de vidro */
        border: 1px solid rgba(0,0,0,0.1);
    }

    /* FILTROS */
    .filter-container {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
        flex-wrap: wrap;
    }

    /* REDES SOCIAIS NO MENU */
    .social-links-menu {
        margin-top: auto;
        display: flex;
        gap: 15px;
        padding: 20px 0;
        justify-content: center;
        width: 100%;
    }
    .social-links-menu .social-link {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 12px;
        color: white;
        text-decoration: none;
        transition: 0.3s;
    }

    /* ANIMAÇÃO DE ENTRADA */
    .product-card {
        animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Estilização dos Botões de Categoria */
.filter-container {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0 40px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 2px solid var(--primary);
    background: white;
    color: var(--primary);
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.filter-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(255, 77, 90, 0.2);
}

.filter-btn.active {
    background: var(--primary);
    color: white;
}

/* Ajuste da Barra Social para ficar acima das categorias */
.social-bar-container {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

/* Garante que o container não dependa do volume de texto */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 50px 20px;
    min-height: 70vh; /* Ocupa 70% da altura da tela no mínimo */
}

/* Padronização dos cards de produto */
.product-card {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    border: 1px solid #eee;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%; /* Faz todos os cards da mesma linha terem a mesma altura */
    animation: fadeIn 0.4s ease forwards;
}

/* Estilo para garantir que a imagem não quebre o layout */
.product-card img {
    width: 100%;
    height: 180px;
    object-fit: contain; /* Ou 'cover' se preferir cortar um pouco a imagem */
    margin-bottom: 15px;
}
    </style>
</head>
<body>

    <header class="header">
    <div class="logo">BAUDEPROMO</div>
    <button class="hamburger" id="menuToggle">
        <span></span><span></span><span></span>
    </button>
</header>

<nav class="menu" id="sideMenu">
    <div class="profile-area">
        <img src="/img/perfil.webp" alt="Perfil" class="profile-img">
        <p style="color: white; font-weight: bold;">Produtos</p>
    </div>
    
    <a href="index.html">Início</a>
    <a href="#eletronicos">Eletrônicos</a>
    <a href="#moda">Moda</a>

    <div class="social-links-menu">
        <a href="#" class="social-link instagram">IG</a>
        <a href="#" class="social-link tiktok">TK</a>
        <a href="#" class="social-link whatsapp">WA</a>
    </div>
</nav>

<div class="modern-search">
    <input 
        type="text" 
        id="searchInput" 
        placeholder="🔍 Buscar por nome ou categoria..."
        onkeyup="searchProducts()"
    >
</div>

<div class="social-bar-container">
    <div class="social-bar">
        <span>Siga-nos:</span>
        <a href="#" class="social-link instagram">Instagram</a>
        <a href="#" class="social-link tiktok">TikTok</a>
        <a href="#" class="social-link whatsapp">WhatsApp</a>
    </div>
</div>

<main class="container">
    <h2 class="section-title">Explore por Categorias</h2>
    
    <div class="filter-container" id="filterBar">
        <button class="filter-btn active" onclick="filterProducts('Todos')">✨ Todos</button>
        <button class="filter-btn" onclick="filterProducts('Eletrônicos')">📱 Eletrônicos</button>
        <button class="filter-btn" onclick="filterProducts('Moda')">👕 Moda</button>
        <button class="filter-btn" onclick="filterProducts('Cozinha')">🍳 Cozinha</button>
    </div>

    <div class="products-grid" id="productDisplay">
        </div>
</main>

    <script src="/js/main-layout.js" defer></script>
    <div id="footer-placeholder"></div>

    <script>
        // Lógica do Menu Hamburger
        const btn = document.getElementById('menuToggle');
        const menu = document.getElementById('sideMenu');
        btn.addEventListener('click', () => {
            btn.classList.toggle('active');
            menu.classList.toggle('active');
        });

        // Carregamento de Produtos
        let allProducts = []; // Variável global para armazenar os dados do JSON

// 1. Carrega os produtos do arquivo JSON
async function loadProducts() {
    try {
        const response = await fetch('/data/produtos.json');
        allProducts = await response.json();
        displayProducts(allProducts);
    } catch (error) {
        console.error("Erro ao carregar JSON:", error);
    }
}

// 2. Renderiza os produtos na tela
function displayProducts(products) {
    const grid = document.getElementById('productDisplay');
    
    if (products.length === 0) {
        grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; padding: 50px;">Nenhum produto encontrado. 😕</p>`;
        return;
    }

    grid.innerHTML = products.map(p => `
        <div class="product-card">
            <span class="discount-badge">OFF</span>
            <img src="${p.imagem}" alt="${p.nome}">
            <span class="category-badge">${p.categoria}</span>
            <h4>${p.nome}</h4>
            <span class="old-price">R$ ${p.precoAntigo}</span>
            <span class="current-price">R$ ${p.precoAtual}</span>
            <a href="${p.link}" class="btn-nav btn-produtos" style="margin-top:15px; opacity:1;">Ver Oferta</a>
        </div>
    `).join('');
}

// 3. Função da Barra de Pesquisa
function searchProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = allProducts.filter(p => {
        return p.nome.toLowerCase().includes(searchTerm) || 
               p.categoria.toLowerCase().includes(searchTerm);
    });
    
    displayProducts(filtered);
}

// 4. Função de Filtro por Clique (Botões de Categoria)
function filterProducts(category) {
    // Resetar a barra de pesquisa ao clicar em uma categoria
    document.getElementById('searchInput').value = '';
    
    // Atualizar visual dos botões
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    if(category === 'Todos') {
        displayProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.categoria === category);
        displayProducts(filtered);
    }
}

// Iniciar
window.onload = loadProducts;
    </script>
</body>
</html>
