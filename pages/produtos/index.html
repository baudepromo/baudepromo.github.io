<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos - Categorias</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/pages/produtos.css">
</head>
<body>

    <header class="header">
    <div class="logo">BAUDEPROMO</div>
    <button class="hamburger" id="menuToggle">
        <span></span><span></span><span></span>
    </button>
</header>

<nav class="menu" id="sideMenu">
    <div class="profile-area">
        <img src="/img/perfil.webp" alt="Perfil" class="profile-img">
        <p style="color: white; font-weight: bold;">Produtos</p>
    </div>
    
    <a href="index.html">Início</a>
    <a href="#eletronicos">Eletrônicos</a>
    <a href="#moda">Moda</a>

    <div class="social-links-menu">
        <a href="#" class="social-link instagram">IG</a>
        <a href="#" class="social-link tiktok">TK</a>
        <a href="#" class="social-link whatsapp">WA</a>
    </div>
</nav>

<div class="modern-search">
    <input 
        type="text" 
        id="searchInput" 
        placeholder="🔍 Buscar por nome ou categoria..."
        onkeyup="searchProducts()"
    >
</div>

<div class="social-bar-container">
    <div class="social-bar">
        <span>Siga-nos:</span>
        <a href="#" class="social-link instagram">Instagram</a>
        <a href="#" class="social-link tiktok">TikTok</a>
        <a href="#" class="social-link whatsapp">WhatsApp</a>
    </div>
</div>

<main class="container">
    <h2 class="section-title">Explore por Categorias</h2>
    
    <div class="filter-container" id="filterBar">
        <button class="filter-btn active" onclick="filterProducts('Todos')">✨ Todos</button>
        <button class="filter-btn" onclick="filterProducts('Eletrônicos')">📱 Eletrônicos</button>
        <button class="filter-btn" onclick="filterProducts('Moda')">👕 Moda</button>
        <button class="filter-btn" onclick="filterProducts('Cozinha')">🍳 Cozinha</button>
    </div>

    <div class="products-grid" id="productDisplay">
        </div>
</main>

    <script src="/js/main-layout.js" defer></script>
    <div id="footer-placeholder"></div>

    <script>
        // Lógica do Menu Hamburger
        const btn = document.getElementById('menuToggle');
        const menu = document.getElementById('sideMenu');
        btn.addEventListener('click', () => {
            btn.classList.toggle('active');
            menu.classList.toggle('active');
        });

        // Carregamento de Produtos
        let allProducts = []; // Variável global para armazenar os dados do JSON

// 1. Carrega os produtos do arquivo JSON
async function loadProducts() {
    try {
        const response = await fetch('/data/produtos.json');
        allProducts = await response.json();
        displayProducts(allProducts);
    } catch (error) {
        console.error("Erro ao carregar JSON:", error);
    }
}

// 2. Renderiza os produtos na tela
function displayProducts(products) {
    const grid = document.getElementById('productDisplay');
    
    if (products.length === 0) {
        grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; padding: 50px;">Nenhum produto encontrado. 😕</p>`;
        return;
    }

    grid.innerHTML = products.map(p => `
        <div class="product-card">
            <span class="discount-badge">OFF</span>
            <img src="${p.imagem}" alt="${p.nome}">
            <span class="category-badge">${p.categoria}</span>
            <h4>${p.nome}</h4>
            <span class="old-price">R$ ${p.precoAntigo}</span>
            <span class="current-price">R$ ${p.precoAtual}</span>
            <a href="${p.link}" class="btn-nav btn-produtos" style="margin-top:15px; opacity:1;">Ver Oferta</a>
        </div>
    `).join('');
}

// 3. Função da Barra de Pesquisa
function searchProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = allProducts.filter(p => {
        return p.nome.toLowerCase().includes(searchTerm) || 
               p.categoria.toLowerCase().includes(searchTerm);
    });
    
    displayProducts(filtered);
}

// 4. Função de Filtro por Clique (Botões de Categoria)
function filterProducts(category) {
    // Resetar a barra de pesquisa ao clicar em uma categoria
    document.getElementById('searchInput').value = '';
    
    // Atualizar visual dos botões
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    if(category === 'Todos') {
        displayProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.categoria === category);
        displayProducts(filtered);
    }
}

// Iniciar
window.onload = loadProducts;
    </script>
</body>
</html>
