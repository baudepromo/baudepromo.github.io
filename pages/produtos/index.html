<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos - Categorias</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/pages/produtos.css">
    <style>
        /* PERFIL E MENU */
        .profile-area {
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            margin-bottom: 10px;
        }

        /* BARRA DE PESQUISA TRANSPARENTE */
        .modern-search {
            position: sticky;
            top: 80px;
            z-index: 900;
            background: transparent;
            padding: 15px 20px;
        }
        .modern-search input {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,0,0,0.1);
            width: 100%;
            padding: 12px;
            border-radius: 8px;
        }

        /* FILTROS */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 22px;
            border-radius: 50px;
            border: 2px solid var(--primary, #ff4d5a);
            background: white;
            color: var(--primary, #ff4d5a);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .filter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255, 77, 90, 0.2);
        }

        .filter-btn.active {
            background: var(--primary, #ff4d5a);
            color: white;
        }

        .product-card {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .social-bar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">BAUDEPROMO</div>
        <button class="hamburger" id="menuToggle">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="modern-search">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="🔍 Buscar por nome ou categoria..."
            onkeyup="searchProducts()"
        >
    </div>

    <div class="social-bar-container">
        <div class="social-bar">
            <span>Siga-nos:</span>
            <a href="#" class="social-link instagram">Instagram</a>
            <a href="#" class="social-link tiktok">TikTok</a>
            <a href="#" class="social-link whatsapp">WhatsApp</a>
        </div>
    </div>

    <main class="container">
        <h2 class="section-title">Explore por Categorias</h2>
        
        <div class="filter-container" id="filterBar">
            <button class="filter-btn active" onclick="filterProducts('Todos', event)">✨ Todos</button>
            <button class="filter-btn" onclick="filterProducts('Eletrônicos', event)">📱 Eletrônicos</button>
            <button class="filter-btn" onclick="filterProducts('Moda', event)">👕 Moda</button>
            <button class="filter-btn" onclick="filterProducts('Cozinha', event)">🍳 Cozinha</button>
        </div>

        <div class="products-grid" id="productDisplay"></div>
    </main>

    <script src="/js/main-layout.js" defer></script>
    <div id="footer-placeholder"></div>

    <script>
        // Lógica do Menu Hamburger
        const btn = document.getElementById('menuToggle');
        const menu = document.getElementById('sideMenu');
        if(btn && menu) {
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
                menu.classList.toggle('active');
            });
        }

        let allProducts = [];

        // 1. Carrega os produtos do arquivo JSON
        async function loadProducts() {
            try {
                const req = await fetch('/data/produtos.json');
                if (!req.ok) throw new Error(`Erro: ${req.status}`);
                
                allProducts = await req.json();
                displayProducts(allProducts);
            } catch (error) {
                console.error("Erro ao carregar JSON:", error);
            }
        }

        // Função para codificar link
        function encodeLink(url) {
            return btoa(url);
        }

        // 2. Renderiza os produtos na tela
        function displayProducts(products) {
            const grid = document.getElementById('productDisplay');
            const favorites = JSON.parse(localStorage.getItem('userFavorites')) || [];
            
            if (products.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; padding: 50px;">Nenhum produto encontrado. 😕</p>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const isFav = favorites.some(f => f.id === p.id);
                
                // CORREÇÃO: Definindo a URL de redirecionamento corretamente
                const encodedLink = encodeLink(p.link);
                const finalRedirectUrl = `/pages/produtos/info/index.html?id=${p.id}`;

                return `
                <div class="product-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <span class="discount-badge">OFF</span>
                        <button onclick="toggleFavorite(${p.id}, this)" style="background:none; border:none; font-size:24px; cursor:pointer;">${heartIcon}</button>
                    </div>
                    
                    <img src="${p.imagem}" alt="${p.nome}" style="width:100%; height:200px; object-fit:contain;">
                    <span class="category-badge">${p.categoria}</span>
                    <h4>${p.nome}</h4>
                    <span class="old-price">R$ ${p.precoAntigo}</span>
                    <span class="current-price">R$ ${p.precoAtual}</span>
                    
                    <a href="${finalRedirectUrl}" target="_blank" class="btn-nav btn-produtos" style="display:block; text-align:center; margin-top:15px; text-decoration:none; background:#ff4d5a; color:white; padding:10px; border-radius:5px;">Ver Oferta</a>
                </div>
                `;
            }).join('');
        }

        // Função para Favoritos
        function toggleFavorite(id, btn) {
            let favorites = JSON.parse(localStorage.getItem('userFavorites')) || [];
            const product = allProducts.find(p => p.id === id);
            
            const index = favorites.findIndex(f => f.id === id);
            
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(product);
            }
            localStorage.setItem('userFavorites', JSON.stringify(favorites));
        }

        // 3. Barra de Pesquisa
        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.nome.toLowerCase().includes(searchTerm) || 
                p.categoria.toLowerCase().includes(searchTerm)
            );
            displayProducts(filtered);
        }

        // 4. Filtro por Categoria
        function filterProducts(category, event) {
            document.getElementById('searchInput').value = '';
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            if(category === 'Todos') {
                displayProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.categoria === category);
                displayProducts(filtered);
            }
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
