<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baú de Promoção | Melhores Ofertas</title>
    
    <meta name="description" content="Encontre as melhores ofertas e promoções.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VNJR25033"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4VNJR25033');
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #ff4b4b 0%, #ff9000 100%);
            --bg-body: #f5f5f5;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --white: #ffffff;
            --accent-yellow: #fdd835;
            --accent-black: #111111;
            
            /* Cores das Lojas */
            --shopee: #ff4d2d;
            --amazon: #ff9900;
            --aliexpress: #ff4747;
            --mercado-livre: #ffe600;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }

        /* --- HEADER SUPERIOR --- */
        header.top-bar {
            background: #ff4b4b;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 800; font-size: 1.4rem; color: white;
            text-transform: uppercase; letter-spacing: -1px; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; }

        .hamburger-btn { background: none; border: none; cursor: pointer; color: white; font-size: 1.5rem; }

        /* --- HERO SECTION --- */
        .hero-section {
            background: var(--primary-gradient);
            padding: 40px 20px 80px;
            text-align: center; color: white;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(255, 75, 75, 0.2);
            margin-bottom: -40px; /* Para sobrepor os cards */
            position: relative; z-index: 1;
        }

        .hero-section h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .hero-section p { font-size: 1rem; opacity: 0.95; margin-bottom: 30px; font-weight: 400; }

        /* --- BOTÕES DE CATEGORIA (Substitui o menu lateral) --- */
        .hero-buttons {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 800px; margin: 0 auto;
        }

        .pill-btn {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);
            padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .pill-btn:hover, .pill-btn.active { background: white; color: #ff4b4b; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .pill-btn i { font-size: 0.8rem; }

        /* --- MENU MOBILE LATERAL --- */
        .mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1999; display: none;
        }
        .mobile-overlay.active { display: block; }

        .mobile-menu {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: white; z-index: 2000; padding: 30px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.1);
        }
        .mobile-menu.active { right: 0; }
        
        .close-menu { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; background: none; border: none; cursor: pointer; color: #333; }
        .mobile-link { text-decoration: none; color: #333; font-weight: 600; font-size: 1.1rem; padding: 10px 0; border-bottom: 1px solid #eee; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            max-width: 1200px; margin: 0 auto; padding: 0 20px 40px;
            position: relative; z-index: 2; flex: 1; width: 100%;
        }

        /* Barra de Busca */
        .search-container {
            background: white; padding: 10px 20px; border-radius: 100px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 15px;
            max-width: 500px; margin: 0 auto 40px; border: 1px solid #eee;
        }
        .search-container i { color: #ff4b4b; }
        .search-container input {
            border: none; outline: none; font-size: 1rem; width: 100%; color: var(--text-dark);
        }

        /* Grid de Produtos */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px;
        }

        /* --- CARDS NOVOS --- */
        .card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: all 0.3s ease;
            display: flex; flex-direction: column; position: relative; border: 1px solid transparent;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: #ffe0e0; }

        .card-img-wrapper {
            height: 220px; padding: 20px; display: flex; align-items: center; justify-content: center;
            background: #fff; position: relative; border-bottom: 1px solid #f0f0f0;
        }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.4s; }
        .card:hover img { transform: scale(1.08); }

        .store-badge {
            position: absolute; top: 15px; right: 15px; font-size: 0.7rem; font-weight: 700;
            padding: 4px 10px; border-radius: 8px; text-transform: uppercase; z-index: 10;
        }
        .badge-amazon { background: var(--amazon); color: #000; }
        .badge-shopee { background: var(--shopee); color: #fff; }
        .badge-aliexpress { background: var(--aliexpress); color: #fff; }
        .badge-mercadolivre { background: var(--mercado-livre); color: #000; }

        .card-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; text-align: left; }
        
        .card h3 {
            font-size: 0.95rem; font-weight: 600; color: #333; margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em;
        }

        .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
        .card-price { color: #ff4b4b; font-weight: 800; font-size: 1.3rem; }
        
        .btn-ver {
            background: var(--text-dark); color: white; text-decoration: none;
            padding: 8px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 600;
            transition: 0.2s;
        }
        .btn-ver:hover { background: #ff4b4b; }

        /* Responsividade */
        @media (max-width: 768px) {
            .hero-section h1 { font-size: 1.8rem; }
            .hero-buttons { justify-content: flex-start; overflow-x: auto; padding-bottom: 10px; white-space: nowrap; }
            .pill-btn { flex: 0 0 auto; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .card-img-wrapper { height: 160px; padding: 10px; }
            .card-info { padding: 15px; }
            .card-price { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="mobile-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="mobile-menu" id="mobile-menu">
        <button class="close-menu" onclick="toggleMenu()"><i class="fa-solid fa-times"></i></button>
        <div style="text-align: center; margin-bottom: 30px;">
            <img src="/assets/img/perfil.webp" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px;">
            <h3>Baú de Promoção</h3>
        </div>
        <a href="#" class="mobile-link">Início</a>
        <a href="favoritos.html" class="mobile-link" style="color: #ff4b4b;">Meus Favoritos</a>
        <a href="#" class="mobile-link">Sobre nós</a>
    </div>

    <header class="top-bar">
        <a href="/" class="logo">
            <img src="/assets/img/perfil.webp" alt="Logo">
            <span>BAÚ</span>
        </a>
        <button class="hamburger-btn" onclick="toggleMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <section class="hero-section">
        <h1>Ofertas Imperdíveis 🔥</h1>
        <p>A curadoria das melhores promoções da internet em um só lugar.</p>
        
        <div class="hero-buttons">
            <button class="pill-btn active" data-tab="eletronicos"><i class="fa-solid fa-bolt"></i> Eletrônicos</button>
            <button class="pill-btn" data-tab="casa"><i class="fa-solid fa-house"></i> Casa</button>
            <button class="pill-btn" data-tab="cozinha"><i class="fa-solid fa-cookie"></i> Cozinha</button>
            <button class="pill-btn" data-tab="moda"><i class="fa-solid fa-shirt"></i> Moda</button>
            <button class="pill-btn" data-tab="beleza"><i class="fa-solid fa-person"></i> Beleza</button>
        </div>
    </section>

    <main class="main-content">
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="O que você procura hoje?">
        </div>

        <div id="product-grid" class="cards-grid">
            </div>
    </main>

    <div id="footer-placeholder"></div>

<script src="/js/main.js"></script>

    <script>
        // --- Lógica do Menu Mobile ---
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('overlay');
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // --- Lógica de Produtos (Mantida e Adaptada) ---
        const productGrid = document.getElementById("product-grid");
        const searchInput = document.getElementById("search-input");
        let allProducts = []; 
        let currentCategory = "eletronicos";

        async function loadAndDisplay() {
            try {
                // Certifique-se que o arquivo products.json está na mesma pasta
                const response = await fetch('/data/produtos.json'); 
                const data = await response.json(); 
                
                allProducts = data.map((p, index) => ({
                    ...p,
                    id: p.id !== undefined ? p.id : index 
                }));

                renderProducts(allProducts.filter(p => p.category === currentCategory));
            } catch (erro) {
                console.error("Erro ao carregar produtos:", erro);
                productGrid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; padding: 40px;'>Erro ao carregar ofertas. Tente atualizar a página.</p>";
            }
        }

        function renderProducts(lista) {
            productGrid.innerHTML = "";
            
            if(lista.length === 0) {
                productGrid.innerHTML = `
                    <div style='grid-column: 1/-1; text-align:center; padding: 40px; color: #666;'>
                        <i class="fa-regular fa-face-sad-tear" style="font-size: 3rem; margin-bottom: 10px;"></i>
                        <p>Nenhum produto encontrado nesta categoria.</p>
                    </div>`;
                return;
            }

            lista.forEach(p => {
                const idMascarado = btoa(unescape(encodeURIComponent(p.id)));
                // Badge da loja
                const storeClass = `badge-${p.store.toLowerCase().replace(/\s/g, '')}`;

                // Criação do Card com o Novo Design
                const card = document.createElement("article");
                card.className = "card";
                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <span class="store-badge ${storeClass}">${p.store}</span>
                        <img src="${p.img}" alt="${p.title}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price-row">
                            <span class="card-price">R$ ${p.price}</span>
                            <a href="info/index.html?id=${idMascarado}" class="btn-ver">Ver <i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        // Event Listeners para os botões de categoria (Pill Buttons)
        document.querySelectorAll(".pill-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".pill-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.tab;
                searchInput.value = ""; 
                renderProducts(allProducts.filter(p => p.category === currentCategory));
            });
        });

        // Event Listener para Busca
        searchInput.addEventListener("input", (e) => {
            const termo = e.target.value.toLowerCase();
            if (termo === "") {
                renderProducts(allProducts.filter(p => p.category === currentCategory));
            } else {
                const filtrados = allProducts.filter(p => p.title.toLowerCase().includes(termo));
                renderProducts(filtrados);
            }
        });

        // Inicializa
        loadAndDisplay();
    </script>
</body>
</html>
