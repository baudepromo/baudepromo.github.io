<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Favoritos ❤️</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/pages/produtos.css">
    <style>
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .btn-remove {
            background: #ffecec;
            color: red;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <meu-menu></meu-menu> <header class="header">
        <div class="logo">Favoritos ❤️</div>
        <a href="/index.html" style="color:white; text-decoration:none;">Voltar</a>
    </header>

    <main class="container">
        <h2 class="section-title">Itens que você amou</h2>
        <div class="products-grid" id="favGrid"></div>
    </main>

    <script>
        function loadFavorites() {
            const grid = document.getElementById('favGrid');
            const favorites = JSON.parse(localStorage.getItem('userFavorites')) || [];

            if (favorites.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>Sua lista está vazia 😢</h3>
                        <p>Volte para a loja e marque os produtos que você gostou!</p>
                        <a href="/pages/produtos/" class="btn-nav btn-produtos" style="display:inline-block; margin-top:20px;">Ir para Loja</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = favorites.map(p => `
                <div class="product-card" id="card-${p.id}">
                    <img src="${p.imagem}" alt="${p.nome}">
                    <h4>${p.nome}</h4>
                    <span class="current-price">R$ ${p.precoAtual}</span>
                    
                    <a href="/pages/info/index.html?ref=${btoa(p.link)}" target="_blank" class="btn-nav btn-produtos" style="opacity:1; margin-top:10px;">Comprar Agora</a>
                    
                    <button class="btn-remove" onclick="removeFavorite(${p.id})">❌ Remover</button>
                </div>
            `).join('');
        }

        function removeFavorite(id) {
            let favorites = JSON.parse(localStorage.getItem('userFavorites')) || [];
            favorites = favorites.filter(p => p.id !== id);
            localStorage.setItem('userFavorites', JSON.stringify(favorites));
            
            // Remove o elemento visualmente sem recarregar tudo
            const card = document.getElementById(`card-${id}`);
            if(card) card.remove();
            
            // Se ficar vazio, recarrega para mostrar a mensagem
            if(favorites.length === 0) loadFavorites();
        }

        window.onload = loadFavorites;
    </script>
</body>
</html>
