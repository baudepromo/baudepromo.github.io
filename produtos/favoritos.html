<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Favoritos | Baú de Promoções</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="img/favicon.jpg" />
    <style>
        :root {
            --bg-body: #05080f;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-home {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
        }

        h1 { font-size: 2rem; font-weight: 800; }

        /* Grid de Favoritos */
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .product-card:hover { transform: translateY(-5px); border-color: var(--primary-accent); }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: white;
            border-radius: 16px;
            margin-bottom: 15px;
            padding: 10px;
        }

        .product-card h3 {
            font-size: 1rem;
            margin: 10px 0;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price { color: #4ade80; font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; }

        .btn-details {
            display: block;
            background: var(--primary-accent);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Meus Favoritos <i class="fa-solid fa-heart" style="color: #ff4747;"></i></h1>
            <a href="index.html" class="back-home"><i class="fa-solid fa-house"></i> Início</a>
        </header>

        <div id="fav-grid" class="fav-grid">
            <div class="empty-state">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary-accent)"></i>
                <p>Carregando sua lista...</p>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAltYkTpdrIShVv7wJXsszQqvOZXTC45Wg",
        authDomain: "baudepromocao-oficial.firebaseapp.com",
        projectId: "baudepromocao-oficial",
        storageBucket: "baudepromocao-oficial.firebasestorage.app",
        messagingSenderId: "743146859125",
        appId: "1:743146859125:web:6d1f5331e22b8ce981263c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            loadUserFavorites(user.uid);
        } else {
            document.getElementById("fav-grid").innerHTML = `
                <div class="empty-state">
                    <h2>Ops!</h2>
                    <p>Você precisa estar logado para ver seus favoritos.</p>
                    <a href="index.html" class="btn-details" style="display:inline-block; margin-top:20px; padding: 12px 30px;">Voltar para o Início</a>
                </div>
            `;
        }
    });

    async function loadUserFavorites(uid) {
        const grid = document.getElementById("fav-grid");
        
        try {
            // 1. Buscar IDs no Firestore
            const snap = await getDoc(doc(db, "wishlists", uid));
            
            if (!snap.exists() || !snap.data().items || snap.data().items.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-heart" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                        <h2>Sua lista está vazia</h2>
                        <p>Favorite alguns produtos e eles aparecerão aqui!</p>
                    </div>
                `;
                return;
            }

            const favoriteIds = snap.data().items.map(id => String(id));

            // 2. Buscar dados no products.json
            const response = await fetch('products.json');
            const products = await response.json();

            // 3. Filtrar produtos
            const myFavorites = products.filter(p => favoriteIds.includes(String(p.id)));

            if (myFavorites.length === 0) {
                grid.innerHTML = "<div class='empty-state'><h2>Nenhuma oferta encontrada.</h2><p>As ofertas que você salvou podem ter expirado.</p></div>";
                return;
            }

            // 4. Renderizar
            grid.innerHTML = "";
            myFavorites.forEach(p => {
                const encodedId = btoa(unescape(encodeURIComponent(p.id))); // Base64 simples
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" alt="${p.title}">
                        <h3>${p.title}</h3>
                        <div class="price">R$ ${p.price}</div>
                        <a href="detalhes.html?id=${encodedId}" class="btn-details">Ver Detalhes</a>
                    </div>
                `;
            });

        } catch (error) {
            console.error("Erro:", error);
            grid.innerHTML = "<p>Erro ao carregar favoritos. Tente novamente mais tarde.</p>";
        }
    }
</script>

</body>
</html>
