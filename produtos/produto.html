<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | Baú de Promoções</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0f18;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .detail-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            position: relative; /* Necessário para o coração flutuar */
        }

        .img-side {
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .img-side img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .info-side {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- O CORAÇÃO (Favoritos) --- */
        .wishlist-wrapper {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50; /* Garante que fique acima de tudo */
        }

        .heart-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.3s ease;
        }

        .heart-btn.active {
            background: #fff;
            color: #ff4747;
            border-color: #ff4747;
            box-shadow: 0 0 15px rgba(255, 71, 71, 0.3);
        }

        /* --- BOTÃO COMPARTILHAR --- */
        .share-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            z-index: 50;
        }

        .price-tag { font-size: 2.5rem; font-weight: 800; color: #4ade80; margin: 20px 0; }
        .cta-button {
            background: var(--primary-accent);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .detail-card { grid-template-columns: 1fr; }
            .img-side { height: 300px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>

    <div id="content-area" class="detail-card">
        <div class="info-side" style="grid-column: span 2; text-align: center;">
            <p>Carregando oferta...</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAltYkTpdrIShVv7wJXsszQqvOZXTC45Wg",
        authDomain: "baudepromocao-oficial.firebaseapp.com",
        projectId: "baudepromocao-oficial",
        storageBucket: "baudepromocao-oficial.firebasestorage.app",
        messagingSenderId: "743146859125",
        appId: "1:743146859125:web:6d1f5331e22b8ce981263c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // --- 1. CARREGAR DADOS DO PRODUTO ---
    async function loadProductDetails() {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        const contentArea = document.getElementById("content-area");

        if (!productId) {
            window.location.href = "index.html";
            return;
        }

        try {
            const response = await fetch('products.json');
            const products = await response.json();
            const product = products.find(p => p.id.toString() === productId);

            if (!product) {
                contentArea.innerHTML = `<div class="info-side" style="grid-column: span 2;"><h2>Produto não encontrado</h2></div>`;
                return;
            }

            contentArea.innerHTML = `
                <button class="share-btn" onclick="window.shareLink('${product.title}', window.location.href)">
                    <i class="fa-solid fa-share-nodes"></i>
                </button>

                <div class="img-side">
                    <div class="wishlist-wrapper">
                        <button id="heart-${product.id}" class="heart-btn" onclick="window.toggleWishlist('${product.id}')">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                    <img src="${product.img}" alt="${product.title}">
                </div>

                <div class="info-side">
                    <span style="color:var(--primary-accent); font-weight:700;">${product.store}</span>
                    <h1 style="margin:10px 0;">${product.title}</h1>
                    <div class="price-tag">R$ ${product.price}</div>
                    <p style="color:var(--text-muted); margin-bottom:30px;">Oferta verificada e segura via ${product.store}.</p>
                    <a href="${product.link}" target="_blank" class="cta-button">
                        Ir para a Loja <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            `;

            // Verifica favoritos após renderizar
            if (currentUser) checkIfFavorite(product.id);

        } catch (e) {
            console.error("Erro:", e);
        }
    }

    // --- 2. LÓGICA DE FAVORITOS (WISH LIST) ---
    window.toggleWishlist = async (productId) => {
        if (!auth.currentUser) {
            alert("Faça login para salvar favoritos e receber ofertas por e-mail!");
            return;
        }

        const userRef = doc(db, "wishlists", auth.currentUser.uid);
        const heartBtn = document.getElementById(`heart-${productId}`);
        const isAdding = !heartBtn.classList.contains('active');

        try {
            const docSnap = await getDoc(userRef);
            if (isAdding) {
                if (!docSnap.exists()) {
                    await setDoc(userRef, { email: auth.currentUser.email, items: [productId] });
                } else {
                    await updateDoc(userRef, { items: arrayUnion(productId) });
                }
                heartBtn.classList.add('active');
            } else {
                await updateDoc(userRef, { items: arrayRemove(productId) });
                heartBtn.classList.remove('active');
            }
        } catch (e) { console.error(e); }
    };

    async function checkIfFavorite(productId) {
        const userRef = doc(db, "wishlists", auth.currentUser.uid);
        const docSnap = await getDoc(userRef);
        if (docSnap.exists() && docSnap.data().items.includes(productId)) {
            document.getElementById(`heart-${productId}`)?.classList.add('active');
        }
    }

    // --- 3. MONITOR DE USUÁRIO ---
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        loadProductDetails(); // Só carrega o produto após saber quem é o usuário
    });

    // --- 4. COMPARTILHAMENTO ---
    window.shareLink = async (title, url) => {
        if (navigator.share) {
            await navigator.share({ title, url });
        } else {
            navigator.clipboard.writeText(url);
            alert("Link copiado!");
        }
    };

</script>
</body>
</html>
