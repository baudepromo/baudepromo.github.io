<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0f18;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .back-btn:hover { color: white; }

        .detail-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .img-side {
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .img-side img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .info-side {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .category-tag {
            color: var(--primary-accent);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 20px; line-height: 1.2; }

        .price-tag {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 30px;
        }

        .features { margin-bottom: 40px; color: var(--text-muted); line-height: 1.6; }

        .cta-button {
            background: var(--primary-accent);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .share-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 10;
        }

        .share-btn:hover { background: var(--primary-accent); transform: scale(1.1); }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            opacity: 0;
            transition: 0.4s;
            z-index: 999;
        }

        .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .product-card { position: relative; } /* Garante que o coração fique preso ao card */

.wishlist-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s ease;
}

.wishlist-btn.active {
    color: #ff4747; /* Vermelho quando favorito */
    background: white;
}

/* Coração de Favoritos */
.wishlist-container {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
}

.heart-btn {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: 0.3s;
}

.heart-btn.active {
    background: #ff4747;
    color: white;
    border-color: #ff4747;
}

.heart-btn:hover {
    transform: scale(1.1);
}

/* Container do coração para ficar posicionado corretamente */
.wishlist-wrapper {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 20;
}

.heart-btn {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.heart-btn.active {
    background: #ffffff;
    color: #ff4747;
    border-color: #ff4747;
    transform: scale(1.1);
}

.heart-btn:hover {
    transform: scale(1.2);
    background: rgba(0, 0, 0, 0.7);
}

        @media (max-width: 768px) {
            .detail-card { grid-template-columns: 1fr; }
            .img-side { height: 250px; }
            .info-side { padding: 30px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>

    <div id="content-area" class="detail-card">
        <div class="info-side" style="grid-column: span 2; text-align: center;">
            <p>Carregando oferta...</p>
        </div>
    </div>
<script>
async function loadProductDetails() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    const contentArea = document.getElementById("content-area");

    if (!productId) {
        window.location.href = "index.html";
        return;
    }

    try {
        const response = await fetch('products.json');
        let products = await response.json();
        const product = products.find(p => p.id.toString() === productId.toString());

        if (!product) {
            contentArea.innerHTML = `<div class="info-side" style="grid-column: span 2; text-align: center;"><h2>Produto não encontrado</h2></div>`;
            return;
        }

        contentArea.innerHTML = `
            <button class="share-btn" onclick="shareLink('${product.title}', '${window.location.href}')">
                <i class="fa-solid fa-share-nodes"></i>
            </button>

            <div class="wishlist-wrapper">
                <button id="heart-${product.id}" class="heart-btn" onclick="toggleWishlist('${product.id}')">
                    <i class="fa-solid fa-heart"></i>
                </button>
            </div>

            <div class="img-side">
                <img src="${product.img}" alt="${product.title}">
            </div>

            <div class="info-side">
                <span class="category-tag">${product.store} • ${product.category}</span>
                <h1>${product.title}</h1>
                <div class="price-tag">R$ ${product.price}</div>

                <div class="features">
                    <p>🔥 <strong>Promoção detectada!</strong></p>
                    <p>✅ Verificado por Baú de Promoções.</p>
                </div>

                <a href="${product.link}" target="_blank" class="cta-button">
                    Ir para a Loja <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        `;

        // Verifica se o usuário já favoritou esse item antes
        if (window.checkIfFavorite) window.checkIfFavorite(product.id);

    } catch (error) {
        console.error("Erro ao carregar:", error);
    }
}

// Função de Compartilhamento Corrigida
window.shareLink = async (title, url) => {
    if (navigator.share) {
        try {
            await navigator.share({
                title: title,
                text: `Olha esse achadinho: ${title}`,
                url: url
            });
        } catch (err) {
            console.log("Compartilhamento cancelado");
        }
    } else {
        // Fallback: Copiar link
        navigator.clipboard.writeText(url);
        alert("Link copiado para a área de transferência!");
    }
};

loadProductDetails();

// Chame a função após definir tudo
loadProductDetails();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAltYkTpdrIShVv7wJXsszQqvOZXTC45Wg",
        authDomain: "baudepromocao-oficial.firebaseapp.com",
        projectId: "baudepromocao-oficial",
        storageBucket: "baudepromocao-oficial.firebasestorage.app",
        messagingSenderId: "743146859125",
        appId: "1:743146859125:web:6d1f5331e22b8ce981263c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        const params = new URLSearchParams(window.location.search);
        const pid = params.get('id');
        if (user && pid) checkIfFavorite(pid);
    });

    // Verificar se é favorito
    window.checkIfFavorite = async (productId) => {
        if (!currentUser) return;
        const userRef = doc(db, "wishlists", currentUser.uid);
        const docSnap = await getDoc(userRef);
        
        if (docSnap.exists() && docSnap.data().items.includes(productId)) {
            document.getElementById(`heart-${productId}`)?.classList.add('active');
        }
    };

    // Alternar Favorito e Registrar E-mail
    window.toggleWishlist = async (productId) => {
    if (!auth.currentUser) {
        alert("Ops! Faça login para salvar seus favoritos e receber ofertas por e-mail.");
        return;
    }

    const userRef = doc(db, "wishlists", auth.currentUser.uid);
    const heartBtn = document.getElementById(`heart-${productId}`);
    
    try {
        const docSnap = await getDoc(userRef);
        const isFav = heartBtn.classList.contains('active');

        if (!isFav) {
            // ADICIONANDO AOS FAVORITOS + CAPTURA DE EMAIL
            if (!docSnap.exists()) {
                await setDoc(userRef, { 
                    email: auth.currentUser.email, // Captura o email para seu tráfego
                    items: [productId] 
                });
            } else {
                await updateDoc(userRef, { items: arrayUnion(productId) });
            }
            heartBtn.classList.add('active');
        } else {
            // REMOVENDO
            await updateDoc(userRef, { items: arrayRemove(productId) });
            heartBtn.classList.remove('active');
        }
    } catch (e) {
        console.error("Erro no Firebase:", e);
    }
};

// Função para checar o estado inicial ao carregar a página
window.checkIfFavorite = async (productId) => {
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = doc(db, "wishlists", user.uid);
            const docSnap = await getDoc(userRef);
            if (docSnap.exists() && docSnap.data().items.includes(productId)) {
                document.getElementById(`heart-${productId}`)?.classList.add('active');
            }
        }
    });
};
</script>

</body>
</html>
