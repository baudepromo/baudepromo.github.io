<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0f18;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .back-btn:hover { color: white; }

        .detail-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .img-side {
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .img-side img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .info-side {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .category-tag {
            color: var(--primary-accent);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 20px; line-height: 1.2; }

        .price-tag {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 30px;
        }

        .features { margin-bottom: 40px; color: var(--text-muted); line-height: 1.6; }

        .cta-button {
            background: var(--primary-accent);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .share-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 10;
        }

        .share-btn:hover { background: var(--primary-accent); transform: scale(1.1); }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            opacity: 0;
            transition: 0.4s;
            z-index: 999;
        }

        .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .detail-card { grid-template-columns: 1fr; }
            .img-side { height: 250px; }
            .info-side { padding: 30px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>

    <div id="content-area" class="detail-card">
        <div class="info-side" style="grid-column: span 2; text-align: center;">
            <p>Carregando oferta...</p>
        </div>
    </div>

<script>
    async function loadProductDetails() {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        const contentArea = document.getElementById("content-area");

        if (!productId) {
            window.location.href = "index.html";
            return;
        }

        try {
            const response = await fetch('products.json');
            let products = await response.json();
            
            // Mapeia IDs se necessário
            products = products.map((p, index) => ({ ...p, id: p.id || index.toString() }));
            const product = products.find(p => p.id == productId);

            if (!product) {
                contentArea.innerHTML = `<div class="info-side" style="grid-column: span 2; text-align: center;"><h2>Produto não encontrado :(</h2></div>`;
                return;
            }

            // Renderiza o conteúdo corretamente dentro da função
            contentArea.innerHTML = `
                <button class="share-btn" onclick="shareProduct('${product.title.replace(/'/g, "\\'")}', '${product.store}')" title="Compartilhar">
                    <i class="fa-solid fa-share-nodes"></i>
                </button>

                <div class="img-side">
                    <img src="${product.img}" alt="${product.title}">
                </div>

                <div class="info-side">
                    <span class="category-tag">${product.store} • ${product.category}</span>
                    <h1>${product.title}</h1>
                    <div class="price-tag">R$ ${product.price}</div>

                    <div class="features">
                        <p>🔥 <strong>Oferta por tempo limitado.</strong></p>
                        <p>✅ Compra 100% segura pela ${product.store}.</p>
                        <p>📦 Frete e prazos calculados na loja.</p>
                    </div>

                    <a href="${product.link}" target="_blank" class="cta-button" onclick="trackClick('${product.id}')">
                        Ir para a Loja <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            `;
        } catch (error) {
            console.error(error);
            contentArea.innerHTML = `<div class="info-side">Erro ao carregar o produto.</div>`;
        }
    }

    function trackClick(id) {
        console.log("Clique no produto:", id);
    }

    async function shareProduct(title, store) {
        const url = window.location.href;
        const shareData = {
            title: `Oferta: ${title}`,
            text: `Olha essa oferta incrível: ${title}`,
            url: url
        };

        if (navigator.share) {
            try {
                await navigator.share(shareData);
            } catch (err) {
                console.log('Compartilhamento cancelado');
            }
        } else {
            copyToClipboard(url);
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast();
        });
    }

    function showToast() {
        let toast = document.getElementById("toast");
        if (!toast) {
            toast = document.createElement("div");
            toast.id = "toast";
            toast.className = "toast-msg";
            toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> Link copiado!`;
            document.body.appendChild(toast);
        }
        setTimeout(() => toast.classList.add("show"), 100);
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    loadProductDetails();
</script>

</body>
</html>
