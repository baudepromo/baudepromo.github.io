<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | Baú de Promoções</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #05080f;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #4ade80;
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(147, 51, 234, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* --- NAVEGAÇÃO --- */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-5px); }

        /* --- CARD PRINCIPAL --- */
        .detail-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
        }

        /* Lado da Imagem */
        .img-side {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            margin: 15px;
            border-radius: 30px;
        }
        .img-side img {
            max-width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .detail-card:hover .img-side img { transform: scale(1.05); }

        /* Lado da Info */
        .info-side {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
        }

        .store-tag {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-accent);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.2rem;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .price-wrapper {
            margin: 30px 0;
        }
        .price-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; }
        .price-tag { font-size: 3.5rem; font-weight: 800; color: var(--success); display: flex; align-items: flex-start; gap: 5px; }
        .price-tag span { font-size: 1.5rem; margin-top: 10px; }

        /* Benefícios */
        .benefits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }
        .benefit-item i { color: var(--primary-accent); }

        /* Botões de Ação */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }
        .cta-button {
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6); }

        /* Favoritos e Share flutuantes */
        .floating-actions {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .icon-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            background: white;
            color: #111;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .icon-btn.heart-btn.active { color: #ff4747; background: #fff; }
        .icon-btn:hover { transform: scale(1.1); }

        /* Toast Moderno */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 15px 30px;
            border-radius: 100px; font-weight: 700; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 10px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        @media (max-width: 900px) {
            .detail-card { grid-template-columns: 1fr; border-radius: 0; }
            .img-side { height: 350px; margin: 10px; }
            .info-side { padding: 40px 30px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Voltar para Ofertas</a>

    <div id="content-area" class="detail-card">
        <div style="grid-column: span 2; padding: 100px; text-align: center;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary-accent)"></i>
            <p style="margin-top: 20px; color: var(--text-muted)">Buscando a melhor oferta...</p>
        </div>
    </div>

<script type="module">
    // --- (MANTENHA SEU CÓDIGO FIREBASE IGUAL AO ANTERIOR AQUI) ---
    // ... importações e config do firebase ...

    // Função de renderização melhorada
    async function loadProductDetails() {
        const params = new URLSearchParams(window.location.search);
        const encodedId = params.get('id');
        if (!encodedId) return;
        
        const productId = atob(encodedId); 
        const contentArea = document.getElementById("content-area");

        try {
            const res = await fetch('products.json');
            const products = await res.json();
            const product = products.find(p => String(p.id) === String(productId));

            if (!product) {
                contentArea.innerHTML = "<h2 style='padding: 50px'>Oferta Expirada!</h2>";
                return;
            }

            contentArea.innerHTML = `
                <div class="img-side">
                    <div class="floating-actions">
                        <button id="heart-${product.id}" class="icon-btn heart-btn" onclick="toggleWishlist('${product.id}')">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                        <button class="icon-btn" onclick="shareLink('${product.title}', location.href)">
                            <i class="fa-solid fa-share-nodes"></i>
                        </button>
                    </div>
                    <img src="${product.img}" alt="${product.title}">
                </div>
                <div class="info-side">
                    <span class="store-tag">${product.store}</span>
                    <h1>${product.title}</h1>
                    
                    <div class="price-wrapper">
                        <p class="price-label">Preço exclusivo no Baú:</p>
                        <div class="price-tag"><span>R$</span> ${product.price}</div>
                    </div>

                    <div class="benefits-grid">
                        <div class="benefit-item"><i class="fa-solid fa-truck-fast"></i> Frete Grátis</div>
                        <div class="benefit-item"><i class="fa-solid fa-shield-check"></i> Compra Segura</div>
                        <div class="benefit-item"><i class="fa-solid fa-credit-card"></i> 10x sem juros</div>
                        <div class="benefit-item"><i class="fa-solid fa-rotate-left"></i> Devolução Grátis</div>
                    </div>

                    <div class="actions">
                        <a href="${product.link}" target="_blank" class="cta-button">
                            Aproveitar Promoção <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.8rem; margin-left: 10px"></i>
                        </a>
                        <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 10px">
                            Você será redirecionado para o site oficial da ${product.store}.
                        </p>
                    </div>
                </div>
            `;

            checkIfFavorite(product.id);
        } catch (e) { console.error(e); }
    }
    
    // (MANTENHA AS OUTRAS FUNÇÕES: toggleWishlist, checkIfFavorite, shareLink, etc.)
    // Apenas mude a função showToast para combinar com o novo estilo:
    function showToast(msg) {
        const t = document.createElement("div");
        t.className = "toast";
        t.innerHTML = `<i class="fa-solid fa-check-circle" style="color: var(--success)"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => {
            t.style.opacity = "0";
            setTimeout(() => t.remove(), 500);
        }, 2500);
    }
    
    // Inicia
    loadProductDetails();
</script>
</body>
</html>
