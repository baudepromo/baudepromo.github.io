<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | Baú de Promoções</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #05080f;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #4ade80;
            --warning: #facc15; /* Cor para o alerta */
        }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(147, 51, 234, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* --- NAVEGAÇÃO --- */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-5px); }

        /* --- CARD PRINCIPAL --- */
        .detail-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            min-height: 600px;
        }

        /* Lado da Imagem */
        .img-side {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            margin: 15px;
            border-radius: 30px;
        }
        .img-side img {
            max-width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .detail-card:hover .img-side img { transform: scale(1.05); }

        /* Lado da Info */
        .info-side {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
        }

        .store-tag {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-accent);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.2rem;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 20px;
            margin-top: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .price-wrapper { margin: 30px 0; }
        .price-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; }
        .price-tag { font-size: 3.5rem; font-weight: 800; color: var(--success); display: flex; align-items: flex-start; gap: 5px; }
        .price-tag span { font-size: 1.5rem; margin-top: 10px; }

        /* Benefícios */
        .benefits-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }
        .benefit-item i { color: var(--primary-accent); }

        /* Botões de Ação */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: auto;
        }
        .cta-button {
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            border: none;
            cursor: pointer;
            display: block;
        }
        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6); }

        /* Favoritos e Share flutuantes */
        .floating-actions {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .icon-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            background: white;
            color: #111;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .icon-btn:hover { transform: scale(1.1); }
        
        /* Estados Ativos */
        .icon-btn.heart-btn.active { color: #ff4747; background: #fff0f0; }
        .icon-btn.alert-btn.active { color: #eab308; background: #fffbeb; } /* Amarelo para alerta */

        /* Toast Moderno */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 15px 30px;
            border-radius: 100px; font-weight: 700; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 10px;
            animation: slideUp 0.4s ease-out;
            visibility: hidden; /* Oculto por padrão */
        }
        .toast.show { visibility: visible; }
        @keyframes slideUp { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        /* Modal Login */
        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            z-index: 9999; align-items: center; justify-content: center;
        }

        @media (max-width: 900px) {
            .detail-card { grid-template-columns: 1fr; border-radius: 0; min-height: auto; }
            .img-side { height: 350px; margin: 10px; }
            .info-side { padding: 40px 30px; }
            h1 { font-size: 1.8rem; }
            .back-btn { top: 15px; left: 15px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i> Voltar</a>

    <div id="content-area" class="detail-card">
        <div style="grid-column: span 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 50px;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary-accent)"></i>
            <p style="margin-top: 20px; color: var(--text-muted)">Carregando oferta...</p>
        </div>
    </div>

    <div id="toast-box" class="toast"></div>

    <div id="login-modal" class="modal-overlay">
        <div style="background: #111827; padding: 40px; border-radius: 32px; border: 1px solid var(--glass-border); text-align: center; max-width: 380px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div style="width: 80px; height: 80px; background: rgba(59, 130, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fa-solid fa-user-lock" style="color: #3b82f6; font-size: 2.5rem;"></i>
            </div>
            <h2 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; color: #fff;">Faça Login</h2>
            <p style="color: var(--text-muted); line-height: 1.5; margin-bottom: 30px;">Para salvar favoritos e criar alertas, precisamos saber quem é você.</p>
            
            <button id="btn-google-login" style="width: 100%; background: #fff; color: #000; border: none; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                Entrar com Google
            </button>

            <button onclick="document.getElementById('login-modal').style.display='none'" style="background: transparent; border: none; color: var(--text-muted); margin-top: 20px; cursor: pointer; font-weight: 600; font-size: 0.9rem;">
                Cancelar
            </button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAltYkTpdrIShVv7wJXsszQqvOZXTC45Wg",
        authDomain: "baudepromocao-oficial.firebaseapp.com",
        projectId: "baudepromocao-oficial",
        storageBucket: "baudepromocao-oficial.firebasestorage.app",
        messagingSenderId: "743146859125",
        appId: "1:743146859125:web:6d1f5331e22b8ce981263c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // --- FUNÇÃO DE LOGIN ---
    const btnLogin = document.getElementById('btn-google-login');
    if(btnLogin) {
        btnLogin.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                document.getElementById('login-modal').style.display = 'none';
                showToast(`Bem-vindo, ${result.user.displayName.split(' ')[0]}!`);
                // A recarga dos detalhes acontece via onAuthStateChanged
            } catch (error) {
                console.error("Erro login:", error);
                showToast("Erro ao fazer login");
            }
        });
    }

    // --- FUNÇÃO GENÉRICA PARA TOGGLE (FAVORITO OU ALERTA) ---
    async function toggleCollection(collectionName, productId, elementId, activeClass, successMsg, removedMsg) {
        if (!auth.currentUser) {
            document.getElementById('login-modal').style.display = 'flex';
            return;
        }

        const btn = document.getElementById(elementId);
        const userRef = doc(db, collectionName, auth.currentUser.uid);
        const wasActive = btn.classList.contains('active');

        try {
            btn.classList.toggle('active'); // Feedback instantâneo
            
            // Verifica se o doc existe antes
            const snap = await getDoc(userRef);
            
            if (!wasActive) {
                // Adicionar
                if (!snap.exists()) {
                    await setDoc(userRef, { email: auth.currentUser.email, items: [String(productId)], updatedAt: new Date() });
                } else {
                    await updateDoc(userRef, { items: arrayUnion(String(productId)) });
                }
                showToast(successMsg);
            } else {
                // Remover
                await updateDoc(userRef, { items: arrayRemove(String(productId)) });
                showToast(removedMsg);
            }
        } catch (e) {
            console.error(`Erro em ${collectionName}:`, e);
            btn.classList.toggle('active'); // Reverte visualmente
            showToast("Erro na operação.");
        }
    }

    // Wrappers para usar no HTML
    window.toggleWishlist = (pid, eid) => toggleCollection("wishlists", pid, eid, "active", "Salvo nos favoritos ❤️", "Removido dos favoritos");
    window.toggleAlert = (pid, eid) => toggleCollection("alerts", pid, eid, "active", "Alerta criado! 🔔", "Alerta removido");

    // --- SHARE LINK ---
    window.shareLink = async (title, url) => {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Baú de Promoções',
                    text: `Olha essa oferta: ${title}`,
                    url: url
                });
            } catch (err) {
                console.log('Share cancelado');
            }
        } else {
            // Fallback para PC
            try {
                await navigator.clipboard.writeText(url);
                showToast("Link copiado! 📋");
            } catch (err) {
                showToast("Erro ao copiar link.");
            }
        }
    };

    // --- CARREGAMENTO DE DETALHES ---
    async function loadProductDetails() {
        const params = new URLSearchParams(window.location.search);
        const encodedId = params.get('id');
        const contentArea = document.getElementById("content-area");

        if (!encodedId) return;

        try {
            const productId = decodeURIComponent(escape(atob(encodedId)));
            const res = await fetch('products.json');
            const products = await res.json();
            const product = products.find(p => String(p.id) === productId);

            if (!product) {
                contentArea.innerHTML = "<h2 style='color:white; text-align:center;'>Oferta expirada ou não encontrada!</h2>";
                return;
            }

            // IDs únicos para os botões
            const safeId = btoa(unescape(encodeURIComponent(productId))).replace(/[^a-zA-Z0-9]/g, '');
            const heartId = "heart_" + safeId;
            const alertId = "alert_" + safeId;

            contentArea.innerHTML = `
                <div class="img-side">
                    <div class="floating-actions">
                        <button id="${heartId}" class="icon-btn heart-btn" 
                                onclick="toggleWishlist('${product.id}', '${heartId}')"
                                title="Adicionar aos favoritos">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                        
                        <button id="${alertId}" class="icon-btn alert-btn" 
                                onclick="toggleAlert('${product.id}', '${alertId}')"
                                title="Me avise de ofertas">
                            <i class="fa-solid fa-bell"></i>
                        </button>

                        <button class="icon-btn" 
                                onclick="shareLink('${product.title.replace(/'/g, "\\'")}', location.href)"
                                title="Compartilhar">
                            <i class="fa-solid fa-share-nodes"></i>
                        </button>
                    </div>
                    <img src="${product.img}" alt="${product.title}">
                </div>
                <div class="info-side">
                    <span class="store-tag">${product.store}</span>
                    <h1>${product.title}</h1>
                    <div class="price-wrapper">
                        <p class="price-label">Preço exclusivo no Baú:</p>
                        <div class="price-tag"><span>R$</span> ${product.price}</div>
                    </div>
                    <div class="benefits-grid">
                        <div class="benefit-item"><i class="fa-solid fa-truck-fast"></i> Frete Grátis</div>
                        <div class="benefit-item"><i class="fa-solid fa-shield-check"></i> Compra Segura</div>
                        <div class="benefit-item"><i class="fa-solid fa-credit-card"></i> 10x sem juros</div>
                        <div class="benefit-item"><i class="fa-solid fa-rotate-left"></i> Devolução Grátis</div>
                    </div>
                    <div class="actions">
                        <a href="${product.link}" target="_blank" class="cta-button">Aproveitar Promoção</a>
                    </div>
                </div>
            `;

            if (auth.currentUser) {
                checkStatus("wishlists", productId, heartId);
                checkStatus("alerts", productId, alertId);
            }

        } catch (e) {
            console.error("Erro:", e);
            contentArea.innerHTML = "<h2 style='color:white; text-align:center;'>Erro ao carregar oferta.</h2>";
        }
    }

    // Verifica estado inicial (se já deu like ou ativou alerta)
    async function checkStatus(collectionName, productId, elementId) {
        if(!auth.currentUser) return;
        try {
            const snap = await getDoc(doc(db, collectionName, auth.currentUser.uid));
            if (snap.exists() && snap.data().items?.includes(String(productId))) {
                document.getElementById(elementId)?.classList.add('active');
            }
        } catch(e) { console.log(e); }
    }

    // --- TOAST FUNCTION ---
    window.showToast = (msg) => {
        const toast = document.getElementById('toast-box');
        toast.innerHTML = `<i class="fa-solid fa-info-circle"></i> ${msg}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    onAuthStateChanged(auth, (user) => { 
        // Recarrega detalhes para atualizar status dos botões se o user logar
        loadProductDetails(); 
    });

</script>

</body>
</html>
