<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Baú de Promoções | Melhores Achadinhos e Ofertas Online</title>
    <meta name="description" content="Encontre as melhores ofertas, promoções e achadinhos da internet. Seleção diária de produtos com descontos exclusivos no Baú de Promoções.">
    <meta name="keywords" content="promoções, achadinhos, ofertas, descontos, compras online, cupons">
    <link rel="canonical" href="https://seusite.com.br">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Baú de Promoções | Achadinhos e Ofertas">
    <meta property="og:description" content="As melhores ofertas da internet curadas para você economizar todos os dias.">
    <meta property="og:image" content="URL_DA_SUA_IMAGEM_DE_PREVIEW.jpg">
    <meta property="og:url" content="https://seusite.com.br">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Baú de Promoções">

    <link rel="icon" href="/assets/img/favicon.webp"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Baú de Promoções - Melhores Ofertas",
      "description": "Lista de produtos em promoção curados pela nossa equipe."
    }
    </script>

    <style>
        :root {
            --bg: #030712;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #f3f4f6;
            --muted: #9ca3af;
            --hot: #ff2e63;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #0a192f, #030712);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Estrutura Semântica */
        header.profile {
            text-align: center;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .avatar {
            width: 100px; height: 100px;
            border-radius: 30px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), #7000ff);
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px var(--accent-glow);
            transform: rotate(-5deg);
        }

        .avatar i { font-size: 40px; color: #000; transform: rotate(5deg); }

        h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 8px; letter-spacing: -1px; }
        .profile p { color: var(--muted); margin-bottom: 24px; font-size: 1.1rem; }

        .socials { display: flex; gap: 12px; justify-content: center; }
        .socials a {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            text-decoration: none;
        }

        .socials a:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-5px);
        }

        /* Search */
        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            margin-bottom: 50px;
        }

        .search-container input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: white;
            outline: none;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Grid de Produtos */
        main.grid {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.4s ease backwards;
        }

        .card:hover {
            background: var(--surface-hover);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-8px);
        }

        .card-img-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #fff;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 12px;
            background: var(--hot);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
        }

        .info {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 12px;
            height: 42px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price-row { margin-top: auto; }
        .old { font-size: 0.8rem; color: var(--muted); text-decoration: line-through; }
        .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            margin: 4px 0 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: var(--accent);
            color: #002;
            font-weight: 700;
            text-align: center;
        }

        /* Pagination */
        nav.pagination {
            margin: 50px 0;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav.pagination button {
            padding: 12px 28px;
            border-radius: 14px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        nav.pagination button:disabled { opacity: 0.2; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width: 480px) {
            main.grid { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/stylebase.css">
</head>
<body>

    <header class="profile">
        <div class="avatar" aria-hidden="true"><i class="fa-solid fa-bolt"></i></div>
        <h1>Baú de Promoções</h1>
        <p>Curadoria profissional das melhores ofertas da internet.</p>

        <nav class="socials" aria-label="Redes Sociais">
            <a href="https://www.instagram.com/baudepromocaos" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@baudepromocoes" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://x.com/baudepromocao" aria-label="Twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://www.youtube.com/@BaudePromocoes" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
        </nav>
    </header>

    <section class="search-container">
        <label for="search" class="sr-only" style="display:none">Buscar produtos</label>
        <input type="text" id="search" placeholder="O que você está procurando hoje?">
    </section>

    <main class="grid" id="grid">
        </main>

    <nav class="pagination" aria-label="Navegação de páginas">
        <button id="prev" aria-label="Página anterior"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
        <span id="page" aria-current="page">1</span>
        <button id="next" aria-label="Próxima página">Próxima <i class="fa-solid fa-chevron-right"></i></button>
    </nav>

    <script>
        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const PER_PAGE = 12;

        function shuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function loadProducts() {
            try {
                // Adicione o caminho real do seu JSON
                const res = await fetch('data/products.json');
                const data = await res.json();
                allProducts = shuffle(data);
                filteredProducts = [...allProducts];
                render();
            } catch (err) {
                console.error("Erro ao carregar produtos:", err);
                document.getElementById('grid').innerHTML = '<p>No momento não conseguimos carregar as ofertas. Tente novamente mais tarde.</p>';
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * PER_PAGE;
            const end = start + PER_PAGE;

            filteredProducts.slice(start, end).forEach((p, index) => {
                // SEO: Otimização de Imagem com Loading Lazy e Alt Text
                const imgUrl = p.image || p.img || 'placeholder.jpg';
                const productTitle = p.title.replace(/"/g, '&quot;');
                
                grid.insertAdjacentHTML('beforeend', `
                    <article class="card-container">
                        <a href="${p.link}" class="card" target="_blank" rel="noopener noreferrer" style="animation-delay:${index * 0.03}s">
                            <span class="badge">${p.badge || 'OFERTA'}</span>
                            <div class="card-img-wrapper">
                                <img src="${imgUrl}" alt="Oferta: ${productTitle}" loading="lazy">
                            </div>
                            <div class="info">
                                <h2 class="title">${p.title}</h2>
                                <div class="price-row">
                                    ${p.oldPrice ? `<div class="old">De: ${p.oldPrice}</div>` : ''}
                                    <div class="price">Por: R$ ${p.currentPrice || p.price}</div>
                                    <div class="btn">VER OFERTA</div>
                                </div>
                            </div>
                        </a>
                    </article>
                `);
            });

            document.getElementById('page').innerText = currentPage;
            document.getElementById('prev').disabled = currentPage === 1;
            document.getElementById('next').disabled = end >= filteredProducts.length;
        }

        // Filtro com Debounce simples para performance
        let searchTimer;
        document.getElementById('search').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                filteredProducts = allProducts.filter(p => 
                    p.title.toLowerCase().includes(term)
                );
                currentPage = 1;
                render();
            }, 300);
        });

        document.getElementById('prev').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        document.getElementById('next').onclick = () => {
            if ((currentPage * PER_PAGE) < filteredProducts.length) {
                currentPage++;
                render();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        loadProducts();
    </script>
    <footer id="footer"></footer>
<script src="/assets/js/main.js" defer></script>
</body>
</html>
