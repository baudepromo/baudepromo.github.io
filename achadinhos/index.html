<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baú de Promoções | As Melhores Ofertas Shopee</title>
    
    <meta name="description" content="Os melhores achadinhos e reviews sinceros da Shopee. Economize com links confiáveis e ofertas exclusivas atualizadas diariamente.">
    <meta name="keywords" content="Shopee, Achadinhos, Ofertas, Descontos, Reviews, Promoção">
    <meta name="author" content="Baú de Promoções">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Baú de Promoções">
    <meta property="og:description" content="Confira os melhores produtos da Shopee com descontos de até 80%.">
    <meta property="og:image" content="/assets/img/achadinhos.webp">
    <meta property="og:url" content="https://baudepromo.github.io">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Baú de Promoções">
    <meta name="twitter:description" content="Reviews sinceros e ofertas com links afiliados confiáveis.">

    <link rel="icon" href="/assets/img/achadinhos.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<header>
    <div class="profile-container">
        <img src="/assets/img/achadinhos.webp" class="profile" alt="Logo baudepromo Achadinhos" width="130" height="130" />
    </div>
    
    <h1>Baú de Promoções Achadinhos</h1>
    <p>Curadoria diária dos melhores produtos com preços que você não encontra em qualquer lugar.</p>

    <div class="socials">
        <a href="https://www.instagram.com/baudepromocaos/" class="fa-brands fa-instagram" title="Siga no Instagram"></a>
        <a href="https://www.tiktok.com/@baudepromocoes1283" class="fa-brands fa-tiktok" title="Siga no TikTok"></a>
        <a href="https://www.youtube.com/@BaúdePromoções" class="fa-brands fa-youtube" title="Inscreva-se no YouTube"></a>
        <a href="https://x.com/baudepromocao" class="fa-brands fa-x-twitter" title="Siga no X"></a>
        <a href="https://www.facebook.com/profile.php?id=61585472683221" class="fa-brands fa-facebook" title="Curta no Facebook"></a>
    </div>

    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="search" placeholder="O que você está procurando hoje?" />
    </div>
</header>

<div class="pagination">
    <button id="prevBtn" onclick="changePage(-1)">Anterior</button>
    <span id="pageIndicator">Página 1</span>
    <button id="nextBtn" onclick="changePage(1)">Próxima</button>
</div>

<main class="grid" id="grid"></main>

<p class="empty" id="empty" style="display:none;">
  Ops! Nenhum produto encontrado.
</p>

    <footer id="footer"></footer>
<script src="/assets/js/main.js" defer></script>

<script>
    const grid = document.getElementById("grid");
const empty = document.getElementById("empty");

async function carregarProdutos() {
  try {
    const response = await fetch("ssdata/products.json");

    if (!response.ok) {
      throw new Error("Erro ao carregar JSON");
    }

    const produtos = await response.json();

    if (produtos.length === 0) {
      empty.style.display = "block";
      return;
    }

    produtos.forEach(produto => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${produto.img}" alt="${produto.title}">
        <h3>${produto.title}</h3>
        <span>R$ ${produto.price}</span>
      `;

      grid.appendChild(card);
    });

  } catch (erro) {
    console.error(erro);
    empty.style.display = "block";
  }
}

carregarProdutos();

</script>
</body>
</html>
