<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baú de Promoções | Achadinhos</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030712;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #f3f4f6;
            --muted: #9ca3af;
            --hot: #ff2e63;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #0a192f, #030712);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Header / Perfil */
        .profile {
            text-align: center;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), #7000ff);
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px var(--accent-glow);
            transform: rotate(-5deg);
        }

        .avatar i { font-size: 40px; color: #000; transform: rotate(5deg); }

        h1 { font-weight: 800; font-size: 2rem; margin-bottom: 8px; letter-spacing: -1px; }
        .profile p { color: var(--muted); margin-bottom: 24px; }

        .socials { display: flex; gap: 12px; justify-content: center; }
        .socials a {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            text-decoration: none;
        }

        .socials a:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-5px);
        }

        /* Search */
        .search-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            margin-bottom: 50px;
        }

        .search-container input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: white;
            outline: none;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Grid de Produtos */
        .grid {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: var(--surface-hover);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-8px);
        }

        .card-img-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #fff;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Melhora para fotos de produtos */
            padding: 10px;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 12px;
            background: var(--hot);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
            box-shadow: 0 4px 12px rgba(255, 46, 99, 0.4);
        }

        .info {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 12px;
            height: 42px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price-row { margin-top: auto; }

        .old { font-size: 0.8rem; color: var(--muted); text-decoration: line-through; }

        .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            margin: 4px 0 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: var(--accent);
            color: #002;
            font-weight: 700;
            text-align: center;
            font-size: 0.9rem;
        }

        .card:hover .btn {
            box-shadow: 0 0 20px var(--accent-glow);
            filter: brightness(1.1);
        }

        /* Pagination */
        .pagination {
            margin: 50px 0;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .pagination button {
            padding: 12px 28px;
            border-radius: 14px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
        }

        .pagination button:disabled { opacity: 0.2; cursor: not-allowed; }

        @media(max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .avatar { width: 80px; height: 80px; }
        }

        @keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card {
    animation: fadeInUp 0.4s ease backwards;
}
    </style>
</head>

<body>

    <div class="profile">
        <div class="avatar"><i class="fa-solid fa-bolt"></i></div>
        <h1>Baú de Promoções</h1>
        <p>As melhores ofertas da internet curadas para você.</p>

        <div class="socials">
            <a href="https://www.instagram.com/baudepromocaos"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@baudepromocoes"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://x.com/baudepromocao"><i class="fa-brands fa-twitter"></i></a>
            <a href="https://www.youtube.com/@Ba%C3%BAdePromo%C3%A7%C3%B5es"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="O que você está procurando?">
    </div>

    <div class="grid" id="grid">
        </div>

    <div class="pagination">
        <button id="prev"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
        <span id="page">1</span>
        <button id="next">Próxima <i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <script>
/* ===============================
   ESTADO GLOBAL
================================ */
let allProducts = [];
let filteredProducts = [];
let currentPage = 1;

const PER_PAGE = 12;

/* ===============================
   SHUFFLE (Fisher-Yates)
================================ */
function shuffle(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

/* ===============================
   LOAD (EMBARALHA 1 VEZ)
================================ */
async function loadProducts() {
    try {
        const res = await fetch('data/products.json');
        const data = await res.json();

        // 🔥 EMBARALHA UMA ÚNICA VEZ POR VISITA
        allProducts = shuffle(data);

        filteredProducts = [...allProducts];
        render();
    } catch (err) {
        console.error(err);
        document.getElementById('grid').innerHTML =
            '<p>Erro ao carregar produtos.</p>';
    }
}

/* ===============================
   RENDER
================================ */
function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const start = (currentPage - 1) * PER_PAGE;
    const end = start + PER_PAGE;

    filteredProducts.slice(start, end).forEach((p, index) => {
        grid.insertAdjacentHTML('beforeend', `
            <a href="${p.link}" class="card" target="_blank"
               style="animation-delay:${index * 0.03}s">
               
                <span class="badge">${p.badge || 'OFERTA'}</span>

                <div class="card-img-wrapper">
                    <img src="${p.image || p.img}" alt="${p.title}">
                </div>

                <div class="info">
                    <div class="title">${p.title}</div>

                    <div class="price-row">
                        ${p.oldPrice ? `<div class="old">${p.oldPrice}</div>` : ''}
                        <div class="price">R$ ${p.currentPrice || p.price}</div>
                        <div class="btn">EU QUERO</div>
                    </div>
                </div>
            </a>
        `);
    });

    document.getElementById('page').innerText = currentPage;
    document.getElementById('prev').disabled = currentPage === 1;
    document.getElementById('next').disabled =
        end >= filteredProducts.length;
}

/* ===============================
   SEARCH
================================ */
document.getElementById('search').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    filteredProducts = allProducts.filter(p =>
        p.title.toLowerCase().includes(term)
    );
    currentPage = 1;
    render();
});

/* ===============================
   PAGINATION
================================ */
document.getElementById('prev').onclick = () => {
    if (currentPage > 1) {
        currentPage--;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
};

document.getElementById('next').onclick = () => {
    if ((currentPage * PER_PAGE) < filteredProducts.length) {
        currentPage++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
};

/* ===============================
   INIT
================================ */
loadProducts();
</script>

</body>
</html>
