<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Baú não encontrado | Baú de Promoções</title>
  <link rel="icon" href="/assets/img/favicon.webp"/>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VNJR25033"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-4VNJR25033');
  </script>
  
  <style>
    /* --- NOVA IDENTIDADE VISUAL --- */
    :root {
      --primary-gradient: linear-gradient(135deg, #ff4b4b 0%, #ff9000 100%);
      --bg-body: #f5f5f5;
      --text-dark: #1a1a1a;
      --text-muted: #666666;
      --white: #ffffff;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --accent-color: #ff4b4b;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-dark);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* --- CARD DE ERRO --- */
    .error-container {
      background: var(--white);
      padding: 50px 30px;
      max-width: 500px;
      width: 90%;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0,0,0,0.03);
    }

    /* --- CÓDIGO 404 --- */
    .error-code {
      font-size: 7rem;
      font-weight: 900;
      margin: 0;
      line-height: 1;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
    }

    .chest-icon {
      font-size: 4rem;
      margin-bottom: 10px;
      display: block;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      font-weight: 800;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 35px;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    /* --- BOTÃO --- */
    .btn-home {
      display: inline-block;
      background: var(--primary-gradient);
      color: var(--white);
      text-decoration: none;
      padding: 16px 35px;
      border-radius: 50px; /* Estilo Pill */
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(255, 75, 75, 0.2);
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 75, 75, 0.4);
    }

    /* Efeito de flutuação ajustado */
    .float {
      animation: floating 3s infinite ease-in-out;
      display: inline-block;
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="chest-icon float">📦</div>
    <p class="error-code">404</p>
    <h1>Ops! Esse baú sumiu.</h1>
    <p>Parece que o link que você seguiu expirou ou a página foi movida para outra dimensão das ofertas.</p>
    
    <a href="https://baudepromo.github.io/" class="btn-home">Voltar para o Início</a>
  </div>

</body>
</html>
