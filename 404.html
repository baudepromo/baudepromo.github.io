<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4VNJR25033"></script>

  <style>
    :root {
      --bg: #0f1f26;
      --accent: #1ecbe1;
      --text: #ffffff;
      --muted: #b7d0d6;
    }

    body {
      background: radial-gradient(circle at top, #2a4d59, var(--bg));
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .error-container {
      padding: 20px;
      max-width: 500px;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--accent);
      margin: 0;
      line-height: 1;
      text-shadow: 0 0 20px rgba(30, 203, 225, 0.5);
    }

    .chest-icon {
      font-size: 5rem;
      margin: 20px 0;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    p {
      color: var(--muted);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn-home {
      display: inline-block;
      background: var(--accent);
      color: #002a30;
      text-decoration: none;
      padding: 15px 35px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.3s;
    }

    .btn-home:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(30, 203, 225, 0.4);
    }

    /* Efeito de flutuação */
    .float {
      animation: floating 3s infinite ease-in-out;
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="chest-icon float">🏴‍☠️</div>
    <p class="error-code">404</p>
    <h1>Ops! Esse baú está vazio.</h1>
    <p>Parece que o link que você seguiu expirou ou a página foi movida para outra dimensão das ofertas.</p>
    
    <a href="https://baudepromo.github.io/" class="btn-home">Voltar para a Civilização</a>
  </div>

</body>
</html>
