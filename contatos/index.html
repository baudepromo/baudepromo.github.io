<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contato | Baú de Promoções</title>
  <link rel="icon" href="/assets/img/favicon.webp"/>
  <style>
    :root {
      --bg: #0f1f26;
      --card: #243a44;
      --accent: #1ecbe1;
      --text: #ffffff;
      --muted: #b7d0d6;
    }

    body {
      background: radial-gradient(circle at top, #2a4d59, var(--bg));
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .contact-info h1 {
      color: var(--accent);
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .contact-info p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 15px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .social-item:hover {
      background: rgba(30, 203, 225, 0.1);
      border-color: var(--accent);
      transform: translateX(10px);
    }

    .contact-form {
      background: var(--card);
      padding: 30px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
      font-weight: 600;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #1a2a30;
      color: white;
      font-size: 1rem;
    }

    .btn-send {
      width: 100%;
      background: var(--accent);
      color: #002a30;
      border: none;
      padding: 15px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-send:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 20px rgba(30, 203, 225, 0.4);
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; margin-top: 20px; }
      .contact-info { text-align: center; }
      .social-item:hover { transform: none; }
    }

  </style>
  <link rel="stylesheet" href="/assets/css/stylebase.css">
</head>
<body>

<div class="container">
  <div class="contact-info">
    <h1>Fale Conosco 💬</h1>
    <p>Tem alguma dúvida, sugestão de produto ou proposta de parceria? Escolha o canal de sua preferência.</p>
    
    <div class="social-links">
      <a href="https://www.instagram.com/baudepromocaos" class="social-item" target="_blank">
        <span>📸 Instagram</span>
      </a>
      <a href="https://www.tiktok.com/@baudepromocoes" class="social-item" target="_blank">
        <span>🎵 TikTok</span>
      </a>
      <a href="https://x.com/baudepromocao" class="social-item" target="_blank">
        <span>🐧 X</span>
      </a>
      <a href="https://www.youtube.com/@Ba%C3%BAdePromo%C3%A7%C3%B5es" class="social-item" target="_blank">
        <span>▶️ Youtube</span>
      </a>
      <a href="mailto:baudepromocao@gmail.com" class="social-item">
        <span>📧 baudepromocao@gmail.com</span>
      </a>
    </div>
    
    <a href="/" style="display:inline-block; margin-top:30px; color:var(--accent); text-decoration:none;">← Voltar para a vitrine</a>
  </div>

  <div class="contact-form">
    <form action="https://formsubmit.co/baudepromocao@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://baudepromo.github.io/contatos/sucesso.html">

      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" name="name" id="name" placeholder="Seu nome completo" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="message">Mensagem</label>
        <textarea name="message" id="message" rows="5" placeholder="Como podemos ajudar?" required></textarea>
      </div>

      <button type="submit" class="btn-send">Enviar Mensagem</button>
    </form>
  </div>
</div>

<footer id="footer"></footer>
<script src="/assets/js/main.js" defer></script>


</body>
</html>
